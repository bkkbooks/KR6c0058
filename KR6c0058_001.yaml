body:
  text: 無上甚深微妙法百千萬劫難遭遇我今見聞得受持願解如來真實義金剛二字世間希修行能有幾人知三十二個鐵鐫錎嚼破便是善知識金剛者自性堅固永劫不壞況金性堅剛也此金剛本性無形無相世間希少天上難尋故云世間希時今一切修行之人終日茫茫著相持求不知金剛一性之圓明徒逞六根著相之貪欲故云修行能有幾人知前兩句言金剛本性識者希少後兩句勸修行之人把此一卷金剛經細細嚼破鐵鐫錎者鐵鐫乃是鐵刀錎函也故勸修行之人看三十二分金剛經由如三十二把鐫刀皆要細細嚼破若還有人嚼得破者方才稱得善知識也故云嚼破便是善知識法會因由無斷無休不提正念空過春秋說法聚會由此起因佛在舍衛國祇樹給孤獨園與大比丘衆千二百五十人俱爾時世尊食時著衣持鉢入舍衛大城乞食於其城中次第乞已還至本處飯食訖收衣鉢洗足已敷座而坐因須菩提起問故云法會因由無斷無休者迦葉一笑得來直傳至二十八祖達磨神光三拜得來直傳至曹溪六祖惠能後傳南嶽馬祖直至今時故云無斷無休時今有一等修行之人也有識得一箇眼看耳聞的籠筒佛性也有知得一箇法界真心一向廣覽經教積習字腳在心便說我能我會我悟我達並不提箇正念清解論云若你廣通都知會不著正念怎得中曉了正念和本地何須出聲又啕氣如此不提正念之人空吃嘗齊空過春秋者也故云不提正念空過春秋咄如何是正念噫除了雜念便是正念也法會因由起根源轉動寶藏得安然心無罣礙常常念諸佛時時在目前起句言說法聚會之因由乃是須菩提起問之根源呈句言此一卷金剛經有二十七處疑有二十九處問答或佛問須菩提答或須菩提問佛答由如轉動寶藏此乃須菩提問世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心佛告須菩提汝今諦聽當為汝說善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心如是者乃是般若法須菩提會佛之意才得心內安然故云轉動寶藏得安然轉句言此須菩提心內安然心上無有罣礙乃是無記頑空故云嘗嘗念嘗嘗念者祇是眼看耳聞瞞不得青黃赤白是當人結句故云諸佛時時在目前法會因由普勸世人正好修你說道不能勾大限無人救佛閻王出帖勾地獄三塗不免將身受苦痛難熬無盡休苦痛難熬無盡休我佛如來說法四十九年談經三百餘會祇是勸人及早修行今時世人家私未足夫妻恩愛世事不了男女未大諸事纏身祇說我不能勾得科家道忽朝大限到來臨行手無所措這裡脫下溫布衫那裏穿上胎州襖去去來來何日得了生死苦海幾時得渡我的佛閻羅王在大鐵圍山外有宮殿縱廣六十由旬七重墻壁七重欄楯七重鈴網其外七重多羅行樹臺殿園苑種種可觀王以惡業自然有赤融銅汁在前宮殿即變成鐵色五欲功德皆沒王見此已怖畏不安即走入內時守獄卒取閻羅王高舉撲之以融銅汁灌入王口次第燋然從下而出王作是念往昔作惡令受此苦願捨自身于佛法中出家入道既發善念所住宮殿還復如舊事之了畢還與彩女娛樂彼諸大臣亦復如是閻王尚然何況一切受苦衆生者也出帖勾者閻羅王差無常二鬼勾喚地獄者大海之底有石名沃燋縱廣八萬四千由旬厚二萬里下有八大地獄一名活大地獄二名黑繩大地獄三名合大地獄四名呌喚大地獄五名大呌喚大地獄六名熱惱大地獄七名大熱惱大地獄八名阿鼻大地獄每一重縱廣五百由旬各各有十六小獄周匝圍繞一名黑雲沙小地獄二名糞屎泥小地獄三名五叉小地獄四名飢餓小地獄五名燋渴小地獄六名膿血小地獄七名一銅釜小地獄八名多銅釜小地獄九名鐵磑小地獄十名豳量小地獄十一名雞小地獄十二名灰河小地獄十三斫截小地獄十四劍葉小地獄十五狐狼小地獄十六寒冰小地獄三塗者乃是地獄塗餓鬼塗畜生塗一切作業之人不免將身自受無人替得二受過五百劫故云苦痛難熬無盡休善現起請無形無影自己彌陀迷人不惺善現即是須菩提起來請佛說法在大衆中即從座起褊袒右肩右膝著地合掌恭敬而白佛言希有世尊如來善護念諸菩薩善付囑諸菩薩世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心此乃須菩提從座而起右膝著地合掌恭敬讚嘆世尊身長丈六紫磨金容具三十二相八十種好三界無比口吐八萬四千法門故云希有世尊如來以般若波羅密法護念諸菩薩如來以般若波羅密法付囑須菩提諸大菩薩令諸學人以般若智護念自身心不令妄不起邪念須菩提觀一切善男子善女人躁擾不停念念相續無有間歇云何法而住云何法而降伏其妄想之心也佛言善哉善哉須菩提如汝所說如來善護念諸菩薩善付囑諸菩薩汝今諦聽當為汝說善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心如來觀見須菩提問處孤高故言善哉善哉佛呌須菩提如汝這樣所說乃是劫外向上之間善護我心非獨你得我念諸菩薩我善付囑諸菩薩你今諦聽我當為汝說法若善男子善女人發無上真正之心應如是般若法而住如是般若法而降伏其妄想之心也須菩提言唯然世尊願樂欲聞此須菩提願佛廣說領中下根機盡得開悟也此妄想之心本是不屬相貌非青赤白故云無形無影這箇妄想之心非從外得實是自己彌陀發出來的永嘉云無明實性即佛性幻化空身即法身故云自己彌陀一切迷人不惺此意著相特來不了此心故迷迭不悟善現啓請在本身行住坐臥念真經若還踏著無生地步步頭頭總現成善現即是須菩提起來請問佛法一切修行之人誦何經而菩薩住處誦何經而降伏其妄想之心也佛言如是金剛般若波羅蜜經而住如是金剛般若波羅密經而降伏其妄想之心也此一卷金剛經非是紙上的乃是金性堅剛永結不壞故云金剛般若者智慧也智以方便為功慧以訣斷為用波羅密者發彼岸義也見性得度即登彼岸未得度者即在此岸乃是人人的靈覺真性故云本在身言此一卷金剛經在行住坐臥四威儀中無斷無滅如何增得如何減得故云行住坐臥念真經前兩句說此金剛經在行住坐臥之中後兩句又要行人還要踏無生覺地科儀云步步踏著實地頭頭頂掛虗空穿衣時摸著腰領洗面時揣著鼻梁上樹時兩手攀枝下坑來兩腳點地可謂步步頭頭總現成也善現起請欲要修行路不通眼前黑洞洞六賊來搬弄佛著力緊加功打死無明才得三昧定一法通時萬法通一法通時萬法通言此須菩提請問如來一切修行之人恩愛不斷六欲不除無明未棄如何降伏其妄想之心也故云眼前黑洞洞六賊來搬弄我的佛還要行人著力加功力有五力乃有進力信力念力定力慧力若有智慧之力打死無明煩惱恩愛妄想四事永滅才得無諍三昧定也故云打死無明才得三昧定若得無諍三昧定了顯出清淨涅槃妙心即是一箇法界真心是故一法通時萬法通大乘正宗降伏其心揭起海底直上崑崙大乘非是小乘正宗非是邪宗佛告須菩提諸菩薩摩訶薩應如是降伏其心菩薩者梵語東土為道心衆生摩訶者梵語東土為大乃是大菩薩此大菩薩雖在塵勞心常清淨又慈悲喜捨種種方便化導衆生名為菩薩雖化衆生心無取著是名摩訶薩恭敬一切衆生即是降伏自心處故云大乘正宗降伏其心後兩句海底崑崙者海底即是濕生崑崙即是須彌山王直至非想非非想處天此言所有一切衆生之類若卵生若胎生若濕生若化生若有色若無色若有想若無想若非有想若非無想我皆令入無餘涅槃卵生者迷性也胎生者習性也濕生者隨邪性也化生者見趣性也乃是四生之根若起修心之心不契無相之理名為有色界天內心守直不行恭敬供養但言心直是佛名為無色界天不了中道眼見耳聞心想思惟愛著說法口說佛行心不依行名為有想天迷人坐禪一向除妄不學慈悲喜捨智慧方便單守無心由如木石名為無想天不著有無二想中道還存名為非無想天四蘊成身色蘊空了求理心在名為非想非非想處天若得五蘊空四想忘皆入無餘涅槃而滅度之故云揭起海底直上崑崙大乘正宗勤下功迷人只向外邊尋獅子吼上須彌頂赫得魔王膽戰競修大乘正宗之人莫學懈怠勇猛上加勇猛精進上加精進直下死工夫頓悟真空菩提之體通身無骨全體虗空獨露堂堂包含萬象無心可了無道可成無佛可做無法可說無衆生可度凡即聖聖即凡本性自然成一片此是大乘正宗之人也故云大乘正宗勤下功惟有小乘邪宗參禪打坐打七煉魔念經念佛拜經拜佛求生佛國願生禪天此等迷人只向外邊尋也獅子者喻大乘正宗之人金毛獅子吼聲來一切野狐俱惱烈須彌頂者乃是非想非非想處天此大乘正宗之人哮吼一聲一切緣覺聲聞化他魔王盡皆赫得膽戰心寒故云赫得魔王膽戰競大乘正宗靜裡思量心自驚除却貪嗔病撿點心田靜佛智慧普光明退盡浮雲現出軒轅鏡正覺臺前萬法空正覺臺前萬法空大乘正宗之人在清淨間處思量如來之語心驚膽碎佛言如是滅度無量無數無邊衆生實無衆生得滅度者滅度者乃是解脫之人何以故須菩提若菩薩有我相人相衆生相壽者相即非菩薩衆生佛性本無有異緣有四相不入無餘涅槃有此四相即是衆生無此四相即是解脫悟即衆生是佛四相者迷人恃有財寶學問族姓輕慢一切人名我相雖行佛行人我不除名人相好事歸己惡事施於人名衆生相求生天上願生西方心愛長年名壽者相有四相即是衆生故云淨裡思量心自驚若是大乘正宗之人先要除却自己貪嗔癡病必須服戒定慧真藥時時刻刻檢點自己心田清淨我的佛若得智慧光明焰破從前黑暗浮雲者煩惱也軒轅鏡者圓月也退盡煩惱浮雲顯出本性一輪明月故云退盡浮雲現出軒轅鏡大乘正覺臺前萬法皆空本無一物楞嚴經云一人發真歸元十方虗空悉皆銷殞故云正覺臺前萬法空妙行無住神明皆護自己靈光偶然進步奧妙之行本無住著復次須菩提菩薩於法應無所住乃是不住色聲香味觸法布施故云妙行無住若是妙行無住之人所在之處則為有佛是故神明皆護何以故若菩薩不住相布施其福德不可思量菩薩行施心無希求所獲福德如十方虗空不可較量布施者布者普也施者散也能普散盡心中妄念習氣煩惱無明貴高好勇無所蘊積是真布施雖有眼耳鼻舌身意不著色聲香味觸法上是真布施心常清淨了萬法空寂內除貪愛外除我人見人作惡不見其過依教修行心無能所是真布施如是修行乃是不住相布施其福德不可思量佛呌須菩提於意云何東方虗空可思量不須菩提會意東方虗空無邊無際故言不也世尊佛又呌須菩提南西北方四維上下虗空可思量不須菩提會意十方虗空無有邊際故云不也世尊佛告須菩提菩薩無住相布施福德亦復如是不可思量如是叮囑須菩提菩薩但應如所教住乃是但該應住無相布施古人云始從剋念之功必成無為之地乃是菩薩住處故云自己靈光偶然進步妙行無住世間希玄妙消息那個知點開一隻通天眼萬兩黃金買不來妙行無住之人不住眼耳鼻舌身意不住東方不住西方不住南方不住北方不住上方不住下方不住天堂不住地獄不住參禪不住打坐不住打七不住煉魔不住燒香不住點燭不住念佛看經一切都不住是故妙行無住世間希玄妙消息乃是盡虗空遍法界那箇道理故云玄妙消息那箇知若得明師點開我一隻通天徹地之眼照見恆河沙數三千大千世界觀見無萬億佛剎親見無數諸佛諸菩薩共合一箇法體如此者就是萬萬兩黃金買不來也妙行無住妄想貪嗔盡掃除貢高休要起昧心瞞不住佛魔王盡遭誅拿住猿猴瑣在清凉樹自在逍遙樂有餘自在逍遙樂有餘妙行無住之人不比靠墻靠壁的折腳不比靠佛來度的瞎子那等妙行無住之人一切都不靠科儀云妙體本來無處所通身何更有蹤由是故妙行無住若修妙行之人一切妄想貪嗔貢高好勇瞞心昧己盡情掃蕩無餘故云昧心瞞不住我的佛若得盡情掃蕩無餘魔王決然拿住故云魔王盡遭誅又要把心猿意馬鎖在清凉無影樹上不許太陽火熾故云鎖在清凉樹才得自在逍遙樂有餘咄一切修行之人鎖不住者謂何呀不識清凉無影樹反被太陽無明火熾燒斷了如來戒定慧鎖定了自己心猿意馬因此流浪家鄉不得自在者也如理實見猶如閃電上下明徹打成一片如如真妙理為真實之見解佛呌須菩提於意云何可以身相見如來不須菩提會意渠無相貌何處求形本來無此身相故答言不也世尊不可以身相得見如來何以故如來所說身相即非身相色身是相法身是性一切善惡皆由法身不由色身法身若作惡色身不生善法身若作善色身不生惡凡夫惟見色身不見法身故答身相即是非相佛告須菩提凡所有相皆是虗妄一念未興塵勞先起迷棄本性皆是虗妄是故猶如閃電若見諸相非相則見如來如來欲顯法身故說一切諸相虗妄不實即見法身如未之理如此者上下明徹打成一片如理實見本來真只在當人一念心四維上下無所管大地山河盡是金此如理實見非是邪見小乘小乘之人觀見四方境界或見青光紅光或見金光白光或見回光圓光或見青蓮紅蓮或見金蓮白蓮或見金臺樓閣或見阿彌陀佛灌滿十方或見觀音勢至常來接引但有見相並是邪相科儀云正法眼中無可得若是如理實見之人若見諸相非相則見如來見黃花即對黃花見翠竹即對翠竹僧問大龍色身敗壞如何是堅固法身大龍云山花開似錦澗水湛如藍直得如是見者名為如理實見本來人者將一莖草作丈六金身將丈六金身作一莖草故云如理實見本來人這箇本來人在當人面上眼看耳聞的鼻聞口說的手拈腳走的思量計較的是故只在當人一念心這箇當人靈覺真性天不能蓋地不能載陰陽不能害五行不能役鬼神不能拘劫火不能害故云四維上下無所管若識得遍大地是一箇丈六金身故云大地山河盡是金如理實見十惡八邪在目前光明全體現愚癡多雜念佛精進更加參久遠功夫自然成一片打碎泥團不用參打碎泥團不用參此如理實見之人不得還鄉者何也呀因有十惡八邪不得還鄉十惡者身口意三業分為十惡身有三惡淫殺盜意有三惡貪嗔癡口有四惡誑言綺語惡口兩舌八邪者人我是須彌邪心是海水煩惱是波浪毒害是惡龍虗妄是鬼神塵勞是魚鱉貪嗔是地獄愚癡是畜生若得除人我須彌倒去邪心海水渴煩惱無波浪滅毒害忘惡龍絶虗妄無神鬼滅塵勞散魚鱉絶貪嗔忘地獄滅愚癡斷畜生絶是故十惡八邪在目前若有人識得自己光明不破十惡八邪瞞過咄要見光明麼咦聽我十字偈曰眼放光能照見青黃赤白耳放光能聽得好歹菩聲鼻放光能知覺馨香穢污舌放光談玄妙普度衆生身放光知冷熱能知飢飽意放光知高下變化多般渾身上透玲玲放光動地放光明遍法界獨自為尊所以光明全體現也今時一切愚迷之人不識自己光明雜念數多恩愛不斷我執不除是故愚癡多維念我的佛即今科家苦勸一切修行之人精進勇猛更加參訪明師求其印證印證師真久久下鳥道之功忽然聞得箇人法雙忘㘞地一聲而成一片故云久遠工夫自然成一片若要成一片必須打破泥彈子有人打得碎者萬事了畢故云打碎泥團不用參正信希有鐵牛嗷吼震倒須彌邪魔奔走正信修行向心修此人最為第一希有須菩提白佛言世尊頗有衆生得聞如是言說章句生實信不須菩提聞此般若法難信難解末世凡夫智慧微劣聞此金剛經章句云何信入佛言須菩提莫作如是之說如來滅後後五百歲有持戒修福者正法一千年上五百年解脫為正宗下五百年禪定為正宗如來在日聞此般若法者不以為難後五百年乃至末法皆修禪定不得禪定不得解脫於此金剛經章句能生信心以此為實當知是人不於一世供養佛二世供養佛三四五世供養佛而種善根已於無量千萬世供養佛所種諸善根何名種諸善根略述次下所謂於諸佛所一心供養隨順教法於諸菩薩善知識師父大德高僧父母尊長嘗行恭敬供養承順教命不違其意於一切貧苦衆生起慈憫心不生輕厭有所須求隨力惠施於六道衆生不加殺害不欺不賤不毀不辱不騎不箠不食其肉常行饒益是名種諸善根今來聞是金剛經章句乃至一念生清淨信者是故正信希有佛言須菩提如此淨信衆生如來悉知悉見是諸衆生得了如是之法無量無邊福德何以故是諸衆生無復有我相人相衆生相壽者相無般若法相亦無不得般若法相此人雖行般若心不住空見何以故是諸衆生若心上取相則為著我人衆生壽者若取般若法相即著我人衆生壽者何以故若取非般若法相即著我人衆生壽者是故不應取法不應取非法此兩句取又不是不取又不是以是義故如來常說汝等比丘知我說法如筏喻者法尚應捨何況這些生天等法故云正信希有修正信之人喻如鐵牛不認人情嗷吼一聲萬法皆空把一箇須彌山王震倒了也一切三界十八梵天二十五有他化魔王無有安身之地故云震倒須彌邪魔奔走正信希有妙法傳一念無差遍大千九曲黃河顛倒轉普天徹地一輪圓修正信之人非在舌辨亦非足行全憑心地下功心地下功全拋世事佛告須菩提何以故是諸衆生若心取相或求西方或求天上或求後世為人則為著我人衆生壽者若取法相我得般若波羅蜜法即著我人衆生壽者若取非法相我不行般若波羅蜜法即著我人衆生壽者是故不應取法不應取非法修行人識得此病明得此理乃是超生脫死的妙法故云正信希有妙法傳傳箇甚麼昔日世尊正法眼藏涅槃妙心傳與迦葉迦葉一笑得來直至二十八禪達磨神光三拜得來直至六祖慧能俱是正信妙法名為一念今時有等迷人單提一句南無阿彌陀佛為之一念怎麼遍得大千世界若差之毫厘失之千里我今直說一念者乃是無念無念乃是般若心經云三世諸佛依般若波羅蜜多故云阿耨多羅三藐三菩提咄何者是般若波羅蜜多法要全般若法一點識心無如此者一念無差遍大千九曲黃河通天河水常東流故此世上江湖河海水不得乾科儀云千江有水千江月若得黃河之水顛倒返流世上無水才識得達磨西來水在長江月在天呵呵真是不知白日青天裏開眼許多迷路人故云九曲黃河顛倒轉普天徹地一輪圓正信希有有名利貪花水上漚功名未成就莫要相諍鬬佛急急早回頭火燒眉毛才把頭救一日無常萬事休一日無常萬事休正者體也禮也信者誠也重也禮而無信意必不誠信而無禮心必不實二者具足可謂正信修正信之人看破名利貪花由如水上浮漚速起速滅豈為常也是故名利貪花水上漚功名未成之際莫要貢高我慢諍鬬是非故云莫要相諍鬬我的佛急急早回頭莫等臨危要修遲也聽我偈曰一盞孤燈照夜臺上床脫下襪和鞋半夜三更隨夢去知道天明來不來是故火燒眉毛才把頭來救古人云一日無常到方知夢裏人萬般將不去惟有業隨身故云一日無常萬事休無得無說是真難滅但有絲毫眼中著屑當體空寂無物可得但有言說皆是誑語佛呌須菩提於意云何如來得阿耨多羅三藐三菩提耶如來有所說法耶須菩提言如我解佛所說義無有定法得也不是說也不是名呌做阿耨多羅三藐三菩提亦無有定法如來可說是故無得無說須菩提言何以故如來所說法皆不可取如來法不可說如來說法口誦心不行非法口誦心行乃是非非法若論如此乃是無記頑空鬼家活計所以者何一切賢聖皆以無為法而有差別三乘根性所解不同見有深淺故有差別佛說無為法者即是無住無住即是無相無相即是無生無生即是無滅咄要見無生無滅的麼呌張三應喏喚李四應咳乃是實地解脫佛性是故是真難滅今時有等修行之人妄想佛來救度臨命終時觀音勢至接引西方極樂世界或求禪天或求欲界或求四空定或求後世為人是故金屑雖貴落眼成塵故云但有絲毫眼中著屑無得無說正路頭加鞭進步向前修時時提起不放捨直到波羅彼岸頭無得無說者得也不是說也不是若說得本來無眼耳鼻舌身意非青黃赤白之妙相得箇甚麼若說說佛法不在紙上又不在舌上說箇甚麼古人云三世諸佛口掛壁上歷代祖師結舌七侯到是箇正路頭也若要修箇正路頭的人要加鞭進步勇猛上加勇猛向前修去莫學懈怠之人無有了期時時刻刻提起正念不要放捨是故直到波羅彼岸頭若有一時差錯被鬼神破拿到陰司那時怨不得師傅也非是師不說你自不肯依無得無說佛祖西來玄妙訣笑殺大迦葉神光將臂卸佛方便演三車普救衆生早早離三界好念彌陀歸去來好念彌陀歸去來無得無說之正路乃是佛祖西來之妙訣昔日如來在靈山會上世尊青蓮目瞬示四衆無人領其密意惟摩訶大迦葉一笑佛云吾正法眼藏涅槃妙心付囑與汝汝嘗流布勿令斷絶偈曰法本法無法無法法亦法今付無法時法法何曾法大迦葉於雞足山入寂滅定後達磨西來見梁武帝帝問曰朕造寺寫經齊僧不可勝紀有何功德師曰並無功德帝曰何無功德師曰此但人天小果有漏之因如影隨形雖有非實帝曰如何是真功德師曰淨智妙圓體目空寂如是功德不以世求帝又問如何是聖諦第一義師曰廓然無聖帝曰對朕者誰師曰不識帝不領悟師知機不契渡江寓于少林寺終日面壁而坐有僧神光晨夕參見立雪過膝師憫而問久立雪中當求何事光悲淚曰惟願和尚慈悲開甘露門師曰諸佛妙道曠劫精勤難行能行非忍能忍豈以小德小智輕心慢心光即取刀斷臂師知法器乃曰諸佛最初求道為法忘形汝今斷臂我前求亦可在易名慧可可曰諸佛法印可得聞乎師曰法印匪從人得可曰我心未寧乞師與安師曰將心來與汝安可曰覔心了不可得師曰我與汝安心竟乃是無得無說之妙訣也我的方便演三車乃是羊車鹿車牛車喻如聲聞乘緣根基大小不同故勸行人方便演三車救度衆生早早脫離三界三界者欲界十天色界十八梵天無色界四空天此三界諸天都在五蘊之中古人云未超三界外盡在五蘊中五蘊者乃是色受想行識也今時修行之人不識此理俗語說舉心動念天地皆知教我怎麼離得咦若是不動念現在三界外如來云即今常在三界外絶盡無為出娑婆如是之人好念自己彌陀歸去來依法出生無相無形四生六道盡是迷人諸佛所依之法盡從此一卷金剛經生出佛呌須菩提於意云何若人滿三千大千世界七寶以用布施論一四天下一日月一須彌山王一四大海為一世界每各一千為一小千世界小千等倍中間有十億四大洲十億日月十億須彌山王十億四大海為中千世界中千千倍中間各一萬億為一個三千大千世界將金銀琉璃等七寶以用布施是人所得福德寧為多不須菩提會意乃是人天福報有漏之因故言甚多何以故是福德即非福德清淨性是故如來說福德多於一無利益依金剛般若波羅蜜經修行是自本性不生惡道是名福德性如來說若復有人將此經受持乃至四句偈等為他人說其福勝彼乃是三千大千世界七寶布施有福有盡何以故須菩提一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此一卷金剛經出此經者非是紙上的金剛經要自本性金剛從體起用嘗要覺照覺照心是諸佛動即怕覺照遲及諸佛阿耨多羅三藐三菩提法皆從覺照生是故依法出生佛呌須菩提所謂佛法者有執著心在即非佛法所謂一切文字章句如標如指依標取物依指觀月月不是指標不是物但依經取法經不是法經文則肉眼可見法則慧眼能見若無慧眼但見其文不見其法若不見法即不解佛意不解佛意則誦此經萬卷不得解脫故云無相無形今時一切修行之人不識自己有一卷真金剛經埋沒四生六道是故四生六道盡是迷人依法出生好用功泥牛汲水上崑崙朽木頑石休死坐山河全露法王身心經云三世諸佛依般若波羅蜜多故得阿耨多羅三藐三菩提從上諸佛皆從此經出若要超三界須下死功夫是故依法出生好用功泥牛者泥牛汲水那見身相既無身相現出當人崑崙者須彌山王也喻如最上一乘之人獨露堂堂包含三界故云泥牛汲水上崑崙今時有一等修行之人打坐入定喻如朽木頑石無作用處是故朽木頑石休死坐你看運行星斗的運行日月的行風行雨的落霜落雪的春生夏長的秋收冬藏的花開花謝的水流風動的雲騰鳥飛的呵呵原來山河全露法王身也依法出生努力參禪好下功奉著空王令打開胡思洞佛先住涅槃城下了團營寶寨安排定拿住魔王定太平拿住魔王定太平依般若波羅密法修行之人實是要努力參禪禪者清淨也若得努力參禪清淨才得見性故云努力參禪好下功空王者乃是真空妙體也既然奉著空王之令不要識得便當了了若說我識得真空菩提之體不除心垢無有是處若得實會生死之人要打殺了這些千思萬想計較算人故云打開胡思洞我的佛涅槃者非死也乃是不生不滅不生者人我不生不滅者覺照不滅是故先住涅槃城團營者乃是十二團營管著天下軍民奉著空王之令差本主下了十二團營坐了寶寨安排定了將官拿住了魔王才得天下太平咄乃是十二團營噫不在北京就在此處即令兩隻眼兩箇耳一箇鼻一張口一箇身一箇意兩隻手一雙腳名為十二團營故云拿住魔王定太平一相無相迷人只強兩箇五百却作一貫只這一相本來無形清虗妙道無有踪跡佛呌須菩提於意云何須陀洹能作如是般若之念我得須陀洹果不須菩提會意梵語須陀洹唐言逆流果逆生死流不染六塵一向修無漏業名須陀洹果若了無相法即無得果之心須菩提答言不也世尊何以故須陀洹名為入流果而無所入不入色聲香味觸法是名呌做須陀洹佛又呌須菩提於意云何斯陀洹能作如是般若之念我得斯陀含果不須菩提會意梵語斯陀洹唐言一來果捨三界結縛名一往來往從天上却到人間生從人間死從天上名斯陀含果若了無相法那有得果之心須菩提答言不也世尊何以故斯陀含名一往來而實無往來是名呌做其陀含佛又呌須菩提於意云何阿那含能作如是般若之念我得阿那含果不須菩提會意梵語阿那含唐言不還果亦名出欲出欲者外不見欲境可染內無欲心可行定不向欲界受生故名不還果若了無相法何有得果之心須菩提答言不也世尊何以故阿那含名為不來本性而實無不來是故名呌做阿那含佛又呌須菩提於意云何阿羅漢能作如是般若之念我得阿羅漢道不須菩提會意梵語阿羅漢唐言無諍行又云無學煩惱永盡與物無諍貪嗔癡絶心境俱空內外常寂名阿羅漢若作得果之心即是有諍阿羅漢雖是無學執著無事界須菩提答言不也世尊何以故實無有一法名阿羅漢世尊若阿羅漢作如是般若之念我得阿羅漢道即為著我人衆生壽者世尊須菩提言佛說我得無諍三昧人中最為第一是第一離欲阿羅漢世尊我不作如是般若之念我是離欲阿羅漢何名無諍三昧謂阿羅漢心無生滅來去唯有本覺嘗照嘗照五蘊空寂是名無諍三昧修此三昧超過無學人中最為第一若有一念得果之心我果離欲阿羅漢即不名無諍三昧須菩提呌世尊我若作如是般若之念我得阿羅漢道世尊則不言說再不開口須菩提是樂阿蘭那行者阿蘭那乃是無諍行即是清淨行也以須菩提實無所希求之行而名呌須菩提即是樂阿蘭那行一切迷人不識此理只說有果向禪天即修禪定是故迷人只強若識得無諍三昧即是一相一相即是無相方知裏頭空外頭空裏外相連打成一片故云兩箇五百即作一貫一相無相太分明只在當人一念心十二時中勤般用超出生死涅槃門即這一相本是無相太然分明非從外得只在當人一念之心便是這箇思量計較的故勸行人十二時中常要般用不要放他妄想上去了若是妄想上去了便是輪回之種又不要放他無明煩惱上著腳若是無明煩惱上著腳便是地獄之根是故十二時中勤般用咄怎麼般用即是教人嘗要把那箇本主放在眼睛之外倒坐虗空一片清虗如是悟者決然超出生死涅槃門也一相無相好是虗空不可量本體全無相虗空難度量佛非皂亦非黃總有丹青妙手難描樣無相空中有相光無相空中有相光這箇一相無相由如虗空難度難量自己本來全無相貌虗空既是難度難量本來面目包裹虗空一法難度難量我的佛虗空既無相貌本來亦無踪跡是故非皂亦非黃總有丹青妙手難𦘕本來虗空之相貌咄既無相貌乃是莾蕩須空川老云時時清風明月鎮相隨桃紅李白薔薇紫問著東君總不知且道東在君何處安身見麼打不離割不死在桃紅李白在薔薇黃紫呵呵模得著也未千家詩云等閒識得東風面萬紫千紅總是春故云無相空中有相光莊嚴淨土晝夜作務閉住六門便見佛祖成就莊嚴淨明心地淨土文云心淨即佛土淨佛告須菩提於意云何如來往昔日在燃燈佛所於諸法有所得不佛恐須菩提有得法心為遣此疑故問之須菩提會意知法無所得心外有法若既無法將何所證既何所證以何為得既無所得是名何法須知證而無證得而無得如賊入空室絶却偷心如性圓明本來自有非從外得故須菩提言不也世尊如來在燃燈佛所於法實無所得佛呌須菩提於意云何菩薩莊嚴佛土不須菩提會意本性清淨莊嚴箇甚的麼故言不也世尊何以故莊嚴佛土者若是假相莊嚴則非莊嚴本來清淨佛土無相無形將何物莊嚴耶惟有戒定慧假名莊嚴事理若論報化佛土衆寶莊嚴乃是西方極樂法性佛土諸佛道場清淨性地自性虗空華光三昧淨裸裸赤剎剎乃五眼難觀佛也難見是名莊嚴佛土如來權指西方敲東擊西只要不昧本性見性就是西方故言不也今時有等迷人晝夜念經拜佛晨朝功果觀想彌陀是故晝夜作務佛言是故乃是叮嚀須菩提諸菩薩摩訶薩應如是住一個清淨心不該應住色生心不該應住聲香香味觸法生心應無所住乃是不住眼耳鼻舌身意而生其一個法界真心咦由如百花林裡過一葉不沾身在欲而無欲居塵不染塵把得定作得主心鏡本淨象色元空真如現前心若略動便落凡愚若不自淨其心愛著清淨處心有所得清淨即者著了法相如雲蔽天心常不動六根六塵六識自然滅也地獄空也如天無雲日月常照佛又呌須菩提譬如有人身體如須彌山王縱廣十六萬八千由旬於意云何是這箇身體為大不須菩提會意色身雖大內心量小不名大身色身雖小內心量大等虗空界方名大身色身雖如須彌山王皆是法身顯化故言甚大世尊何以故佛說非身非身是法身是名大身法身無涯含容十方世界量等虗空若人要見眼裡展家風如是觀法身便見十方諸佛安身立命處凡夫的佛性克乎一身眼見耳聞一癢一痛悉皆能知諸佛的覺性遍周沙界無處不是故云閉住六門便見佛祖莊嚴淨土法力齊心猿意馬化為灰六賊能除塵垢淨半夜金烏徹天飛莊嚴淨土淨掃心田佛呌須菩提譬如有人身如須彌山王於意云何是這色身為大不須菩提會佛之意色身雖大皆靠法身之力故言甚大世尊何以故佛說非身乃是法身是名大身此是莊嚴心淨是法得了法身是力故云法力齊既然法力俱齊心猿意馬決然化灰六賊能除者雖有眼耳鼻舌身意不著色聲香味觸法上是故塵垢淨既然塵垢淨的人那有無明煩惱暗遮晝夜常明如是之人由如半夜金烏徹天飛也莊嚴淨土喜捨慈悲四量扶開了無為庫現出值錢物佛酥酪共醍醐清淨摩尼一味如甘露八寶莊嚴生淨土八寶莊嚴生淨土清淨佛土無相無形何物而莊嚴耶唯有大慈大悲大喜大捨四無量心假名莊嚴事理是故喜捨慈悲四量扶無為庫者乃是四大色身無為者乃是本性無為開了者風歸風水歸水火歸火土歸土四大色歸其源現出一靈真性萬劫不壞故云開了無為庫現出值錢物我的佛我有十字要偈大衆聽著靈光體能顯化神通廣大化顯天化顯地萬物能生化顯天顯日月星辰斗府化顯地能堅固萬物能生化顯風遍大地靈光發顯化顯火無邊際靈光發生化顯水潤乾坤靈光津脉化顯地生萬物靈光發生化顯地在人身筋骨皮肉化顯水在人身血脉涎津化顯火在人身渾身暖氣化顯風在人身呼吸運行外頭地人身地原是一地外頭地生萬物五穀能生人身地筋骨肉髮毛爪齒外頭地人身地一氣發生外頭水人身水原是一水外頭水潤乾坤萬物滋生人身水是痰唾血脉流轉外頭水人身水一氣發生外頭火人身火原是一火外頭火無邊際普照乾坤人身火是暖氣穿連一體外頭火人身火一氣發生外頭風人身風原是一風外頭風無邊際翻浪催雲人身風是呼吸穿連一體外頭風人身風一氣發生明道人參透了無三界一箇無身有一日四大散色身敗壞這地水和火風返本還源地歸地水歸水還源去了火歸火風歸風返本還源這地水和火風還源去了靈光性無來去普覆十方靈光性不動搖包天裹地放光明通法界獨自為尊光明大把日月比的不見千諸佛合一體一箇無身這無身無一物又無修證刀難劈水難淹好箇無身無出家無在家本無一物天不蓋地不載好箇無身這無身閻王見不敢睜眼把地獄和刀山化的無踪這箇無身無佛無人諸佛共一身千聖難測法界獨尊無量壽限本來無身如如不動金剛不壞身是故開了無為庫現出這樣一箇值錢物酥酪醍醐者般若是一法分為種種名或謂之慧劍或謂之法雷或謂法鼓或謂催雲或謂甘露或謂酥酪或謂醍醐即是一法隨其用功而得名也乃是法施故云清淨摩尼一味如甘露八寶莊嚴者即是七寶積滿三千大千世界布施乃是財施法施者慧施也財施者修福也福慧雙修生極淨國故云八寶莊嚴生淨土無為福勝出頭端正俱住佛法人人有分現成公案不假施為此無為福勝他一切有為佛呌須菩提如恆河中所有沙數恆河者須彌山南七金山外有一山名雪山高五百由旬黃金所成其頂廣大中有一池方圓五十由旬池有四口廣一由旬四口中出四道恆河各繞池七匝四種之色不相雜亂流入大海分二萬五千道河流灌四大部洲東象口名恆河底銀沙南獅子口名恆河底金剛沙西牛口名恆河底金沙北馬口名恆河底琉璃沙沙細如麵佛故問須菩提如恆河中所有許多沙數如是沙等恆河於意云何是諸多恆河沙寧為多不須菩提會佛意如來不是妄說佛具正遍知眼照見盡虗空遍法界故言甚多世尊但諸恆河尚然多無數恆河何況其一恆河沙佛呌須菩提我今實言告汝若有善男子善女人以七寶滿爾所恆河沙數三千大千世界以用布施得福多不須菩提會佛意況恆河四十里濶底沙細如麵又況一沙是一恆河故言甚多世尊佛告須菩提若善男子善女人於此一卷金剛經中乃至受持金剛般若波羅蜜經這四句偈等為他人說而此經福德勝前七寶布施福德是故無為福勝今有一切修行之人認著紙上的四句偈不識真性中四句偈故云出頭端正若論出頭端正母親生下之時就曉得眼看耳聞知痛知癢乞驚害怕就要乳吃是故出頭端正即今大衆俱在佛法會中明了自己金剛本來面目為四句偈箇箇皆得故云俱住佛法人人有分無為福勝最難尋百尺竿頭進步行却是雲中孤燕子杳杳冥冥覔無踪雖然無為福勝是一切有為其實難尋又不燒香又不點燭又不念經又不念佛又不參禪又不打坐又不打七又不煉魔一切都不用是故最難尋有一等修行之人即識得眼看耳聽的鼻聞口說的手拈腳走的知痛知癢的思量計較的這箇籠筒佛性是故竿頭客一擔都在皮囊上咄燒了皮囊那裏去安身立命又云百尺乃是十丈塔我佛燒身之後留下舍利子世人建塔以之舍利子喻主人公也四大皮囊喻塔行人欲以四威儀中做功夫者或如塔無心之寂滅乃是竽頭客故勸百尺竽頭還要進步乃是離色身外別參一步曉得麼却是雲中孤燕子杳杳冥冥覔無踪也無為福勝福慧雙修不落空布施福力重持經功德勝佛體用竝雙行智慧光通六度并萬行四季花開滿樹紅四季花開滿樹紅無為福勝是有為雖然如是乃是修慧不修福來生聰明窮困苦修福不修慧來生愚濁而富貴是故福慧雙修不落空布施七寶生天福故云布施福力重持經明理得菩提故云持經功德勝我的佛修慧是體修福是用故云體用竝雙行若得智慧光通透太光明藏如人入海展入展深故云智慧光通六度并萬行六度者布施能度慳貪持戒能度毀犯精進能度懈台禪定能度散亂忍辱能度嗔恚智慧能度愚癡萬行者無明結末科儀云末後一句誰敢奉行若是奉行得者人人道好箇箇道強由如四季花開滿樹紅尊重正教皆繇心造舉目動靜無不是道受持正教之人天人皆生敬重復次佛又呌須菩提隨說是此經乃至四句偈等當如此說經之處一切世間天人阿修羅皆應供養如佛塔廟說經之人自心解得金剛經義自身體得無著無相之行不作能所心說此經者即此身中自有如來感得天龍八部皆來供養如佛在塔廟何況有人盡能受持讀誦此一卷金剛經在心須菩提當知是持經之人成就最上第一乘希有之法若是經典所在之處則為有佛如佛親到一般若尊重弟子受持此法故云尊重正教尊重者是誰不尊重者是誰是故皆由心造此正教非在紙上非在墨上非在舌上在當人分上便是這個知痛知癢的思量計較的是故舉目動靜無不是道尊重正教念彌陀時識方知一剎那蛟龍翻起千尺浪汲水灘頭鳥作窩尊重正教之人行住坐臥念一聲南無阿彌陀佛故云尊重正教念彌陀忽然識得自己本性彌陀非從外得是故時識方知一剎那既識自己彌陀豈肯在外之乎者也如是之人好是蛟龍翻起千尺浪由如汲水灘頭鳥作窩如此之人萬中選一也尊重正教無舌童兒談話妙鐵鳳空中呌石女巖前笑佛這事甚蹊蹺除是靈山古佛他知道萬像森羅一性包萬像森羅一性包尊重正教之人剎那識得靈覺真性不被這些之乎者也瞞過普天徹地獨自為尊一切山河大地皆是靈覺真性所現此靈覺真性雖無形相現出萬相故喻如無舌童兒談話妙又喻如鐵鳳空中呌又喻如石女巖前笑此三事單表無中生有也咄那是無那是有噫自己是真無一切天地日月山河大地是有世人尋不著終日觀想四方念經念佛之乎者也我的佛天地日月山河大地千諸古佛萬萬菩薩一切三界諸天皆靠真無皆是真無所生是故這事甚蹊蹺除是靈山釋迦牟尼能知道還有一箇清虗居士他也知道這箇清虗居士知道自性真無再不知乎者也即是肚飢吃飯困來合眼寒來向火熱來扇扇咄如來與清虗這兩人知道箇甚麼他知道萬像森羅一性包如法受持晝夜勤提人身難得莫要空回當如此法承受行持爾時須菩提白佛言世尊當我名此一卷經我等云何樣奉持佛告須菩提是此經名為金剛般若波羅蜜以是名字汝當奉持自性堅固永劫不壞故號金剛這金剛本性於一切色聲香味觸法中無染無著不惑其性成就究竟解脫如是奉持所以者何須菩提佛說般若波羅蜜則非紙上般若波羅蜜乃是本性金剛是名般若波羅蜜佛說般若波羅蜜領諸學人用智慧照破愚心生滅生滅心除盡即到彼岸佛又呌須菩提於意云何如來有所說法不須菩提會意若依般若波羅蜜法即有法得非是般若波羅蜜也到此一合相理大悟小悟都要吐却無佛無法到這箇時節才是般若雖然如來說法心無所得故白佛言世尊如來無所說佛又呌須菩提於意云何三千大千世界所有微塵是為多不須菩提會佛之意世界喻法身妄念喻微塵故答言甚多世尊佛又呌須菩提諸多微塵乃是妄念微塵如來說若是了妄歸真非是微塵若不了真是名微塵如來又說世界衆生妄念盡非世界妄念不盡是名世界如來說衆生性中妄念如三千大千世界微塵一切衆生被妄念微塵遮蔽佛性不得解脫若得妄念盡現出真如佛又呌須菩提於意云何可以三十二相見如來不須菩提會意三十二相乃是報身不得見如來故言不也世尊不可以三十二相得見如來何以故如來說三十二相乃是如來纍劫精修故有果報現三十二相即是非相非相乃是無相無相即是法身若非法身果力焉得有三十二相具足故將三十二相喻三十二清淨行三十二清淨者於五根中修六波羅蜜於意根中修無相無為是名三十二清淨行又云六賊返做六波羅是名三十二相佛又呌須菩提若有善男子善女人以恆河沙等身命布施攪骨擊髓投岩赴火刎頸割肉燃指卸臂捨身捨命若復後有人於此金剛經中乃至受持四句偈等為他人說其福甚多若論多劫捨身不了空義妄心不除元是衆生若是一念持經我人頓盡煩惱妄想盡除焉不解脫是故如法受持前者文字章句句句消歸自己行行脫死超生苦勸行人晝夜勤提我和你人身難得莫要空回如法受持念幾聲蘆芽穿透甚分明識得如來真妙訣一處通來處處通如此之法決要受持咄受持箇甚麼念幾聲的是誰故云如法受持念幾聲咦四大散了怎麼受持蘆芽穿透甚分明不即蘆芽葉底枝頭甚分明不即葉底枝頭水流風動甚分明不即水流風動雲騰鳥飛甚分明還有無數分明不能細說昔日如來靈山會上說法雙林涅槃以後今在何處說法蘆芽穿透者是誰說法若識得這箇如來真妙訣一處通來處處通如法受持大乘般若波羅蜜四句無為偈金剛三昧力佛慈悲度羣迷普願人人直指不退地端坐蓮臺證菩提端坐蓮臺證菩提如是之法乃是大乘般若波羅蜜多這是四句無為妙偈大乘即是摩訶摩訶者梵語也東土為大且大者莫過虗空大道無有邊際遍周沙界隨地現青黃的般若者梵語也東上為智慧蓮經云慧日破諸諳能伏災風火若有智慧之目能照破煩惱無明現出本性當人波羅者梵語也東上為彼岸若有慧日照破四大六根不被色聲香味觸所瞞本來就是彼岸蜜多者梵語也東上為無極無極而太極又蜜者和也多者衆法也將自己一靈真性放開包藏萬法萬法盡在太虗之中一性之內修行人以一性均和衆性合而為一故曰蜜多乃是四句無為偈也若得金剛堅固無諍三昧之力照破了四句無為妙偈將四句無為歸於自己名為自利不能接物利生我的佛還要發一箇慈悲之心救度一切大衆是故慈悲度群迷不要傳箇小乘外道法與大衆故云普願人人直指不退地若到不退地上面見阿彌陀佛證無生法忍故云端坐蓮臺證菩提離相寂滅一花五葉熊耳山前面壁不說直下悟空離諸形相既離形相寂滅現前爾時須菩提聞說是經深解義趣涕淚悲泣而白佛言希有世尊佛說如是般若甚深經典我從昔以來所得聲聞慧眼未曾得聞如是般若之經世尊若復後來有人得聞如是般若經信心清淨則生實相當知是人成就最上第一希有成就佛功德也世尊是實相者則是非相非相是乃無相是故如來說名呌實相乃是本性實相但心有所得即非實相也世尊我今得聞如是般若經典親見如來印證信解受持不足為難若當來世如來滅後後五百歲其有衆生得聞如是般若經典信解受持無佛印證自解自悟是人則為第一希有何以故此人無我相無人相無衆生相無壽者相所以者何此人見我相即是非相見人相衆生相壽者相即是非相何以故此人離一切諸相妄心識心俱無則名諸佛佛告須菩提如是如是說得有理若復後來有人得聞是此金剛經不驚大膽人也不怖無怕怖人也不畏不癡人也當如是人甚為希有上根人聞而深信中根人半信半疑下根聞而大笑說此難信之法何以故大人境界普賢知小人聞而心忐忑聲聞久著法相執有為解不了諸法本空忽聞此經諸相不生言下即佛所以驚怖惟有大乘菩薩得聞此理歡喜受持如此之人甚為希有佛又呌須菩提如來說第一檀波羅蜜口說心不行即非第一波羅蜜口說無相法心依無相行是名第一波羅蜜第二持戒波羅蜜佛又呌須菩提第三忍辱波羅蜜如來說執著忍辱見有身相當被所害非忍辱波羅蜜不執忍辱不見身相是名忍辱波羅蜜第四精進波羅蜜第五禪定波羅蜜第六般若波羅蜜如來又說何以故須菩提如我昔為歌利王割截身體我於爾時無我相無人相無衆生相無壽者相何以故我於往昔節節支解此時若有我相人相衆生相壽者相應生嗔恨如來往昔為忍辱仙人有歌利王與諸綵女林野遊樂王倦睡眠綵女山中尋花果遙見仙人林中晏坐共呼馳往皆集其所頂禮仙人即為說法王從睡覺不見諸女仗劍求覔見女圍繞仙人而坐王大嗔怒問之誰耶何誘諸女答曰我是仙人修忍辱行王問汝得非非想定耶答言不得又問汝得四禪定耶答言不得一一問之一一答言不得王曰未離欲界何誘諸女王令可伸一臂試能忍否仙人便伸以劍斬之又問何人答言修忍辱行復令更伸一臂又斷之王如前問仙人如前答斬兩足兩耳一鼻仙人告言王今何故自生疲厭斷我身分由如芥子我亦不生念嗔恚自不守心不為忍辱若有一念痛惱之心即生嗔恨須菩提又念我過去於五百世作忍辱仙人於爾所生何以故無我相無人相無衆生相無壽者相是故須菩提菩薩應離一切色聲香味觸法相發阿耨多羅三藐三菩提心不應住色生心不應住色聲香味觸法生心應結無所住心若此六塵起憎愛心由此妄心積集無量業結而覆佛性雖有種種勤苦修行不除心垢終無解脫之理若法有住或住西方或住三界或住後世為人則為非是道人住處若不住涅槃不住諸法一切不住方是菩薩住處是故佛說菩薩心不應色相七寶布施須菩提菩薩為利益一切衆生應如是般若法布施凡人捨七寶為求後世快樂菩薩不為自求快樂但為內破慳貪外利益一切衆生而說法布施如來說一切諸相即是非相非相即是無相又說一切衆生則非衆生一切衆生盡是假名若離妄心則非衆生佛又呌須菩提如來是真語者實語者如語者不誑語者不異語者真語者說一切衆生皆有佛性實語者說衆生造惡定受惡報如語者說衆生修善定有善報不誑語者說般若波羅蜜法超出三界不異語者如來不說二法佛又呌須菩提如來所說法此法無實無虗無實者以法性空寂無相可得無虗者隨地現青黃處處發嫩草不得言有不得言無有而不有為妙有無而不無是真無故言無實無虗佛又呌須菩提若菩薩心住於諸相法捨七寶而行布施如盲人入暗則無所見若菩薩心不住色聲香味觸法而行布施如人有目日月光照見種種色須菩提當來之世若有善男子善女人能於此一卷金剛經受持讀在心內則為如來以佛的智慧非是緣覺聲聞所知悉知是人悉見是人皆得成就佛果無量無邊功德也是故離相寂滅一花五葉者昔日達磨西來見梁武帝帝不識來意渡江寓於少林寺終日面壁而坐有僧神光晨夕參見立雪齊腰師憫而問久立雪中當求何事光悲相曰惟願和尚慈悲開甘露門師曰諸佛妙道曠劫精勤難行能行非忍能忍豈以小德小智輕心慢心光即取刀斷臂師知法器乃曰諸佛最初求道為法忘形汝今斷臂我前求亦何在易名慧可可曰諸佛法印可得聞乎師曰法印匪從人得可曰我心未寧乞師與安師曰將心來與汝安可曰覔心了不可得師曰我與汝安心竟後欲返天竺之時乃命門人盍各言所諸乎時道副對曰不執文字不離文字而為道用師曰汝得吾身尼總持曰由如慶喜見阿閦佛國一見更無再見師曰汝得吾肉道育曰四大本空五蘊非有無一法可得師曰汝得吾骨慧可禮拜依位而立師曰汝得吾髓師告可曰昔日如來以正法眼藏付迦葉大士展轉囑纍而至於我我今付汝并授袈裟以為法信吾滅後二百年衣止不傳法周沙界聽吾偈曰吾本來茲土傳法救迷情一花開五葉結果自然成端坐而化三祖僧璨初以白衣謁可問曰弟子身纏風病請和尚懺罪可曰將罪來與汝懺居士良久曰覔罪了不可得可曰我與汝懺罪竟璨問曰已知和尚是僧未審何名佛法可曰是心是佛是心是法法佛無二僧寶亦然璨曰今日才知罪性不在內不在外不在中間如其心然佛法無二也四祖道信見璨問曰願和尚乞與解脫法門璨曰誰縛汝信曰無人縛璨曰何更求解脫乎信大悟五祖弘忍為童子時四祖問上姓答曰姓即有不是時嘗姓四祖曰是何姓答曰是佛性四祖曰汝無佛性耶答曰自性空無故無佛性六祖慧能家貧賣柴聞言誦金剛經問曰得於何人客曰得於黃梅能即去參祖五祖問曰汝何來能曰嶺南祖曰欲須何事能曰唯求作佛祖曰嶺南人無佛性能曰人有南北佛性豈然祖知異人使入碓房五祖一日告衆曰各作一偈語意相合則付衣法會下七百餘人上座神秀於壁書一偈身是菩提樹心如明鏡臺時時勤拂拭莫使有塵埃衆皆誦念能聞此偈謂同學曰美則美了未了有偈和之同學皆笑夜深于秀偈之側書偈一首菩提本非樹明鏡亦非臺本來無一物何假須塵埃祖見此偈師乃告曰諸佛出世為一大事故隨機大小說有三乘後以正法眼藏付于迦葉直至達磨輪及于我今以法寶及所傳衣用付於汝師曰法則既授衣付何人祖曰達磨初至人未知信所以傳衣今信心已熟止於汝身不復傳也乃是一花開五葉今時有一等邪迷之人說肝屬東方甲乙木心屬南方丙丁火肺屬西方庚辛金腎屬北方壬癸水脾屬中央戊己土是一花五葉又有邪人說心如華蓋肝腑五葉是一花開五葉又有人說天地日月星是一花開五葉又有人說眼耳鼻舌口是一花開五葉皆是謬語昔日達磨熊耳山前面壁九年不曾開口今時之人臨機轉語講經說法念經念佛我能我會有這許多話說不達祖意故云熊耳山前面壁不說離相寂滅本來人陰陽相合聖賢宗打成一片方成道那知身外脫微塵直下悟空諸相皆無人法雙忘現出實相須菩提言世尊是實相者則是非相非相即是無相是故如來說名呌實相乃是本人也故云離相寂滅本來人陰陽相合者眼屬東方甲乙木耳屬南方丙丁火鼻屬西方庚辛金口屬北方壬癸水身屬中央戊己土老子云耳凝運眼含光鼻調息舌緘氣身心不動身不動為之龍吟心不動為之虎嘯龍吟則精固虎嘯前丹成如來云眼觀鼻鼻觀心心觀意意觀神五行攢簇四大和合孔子云知止而後有定定而后能靜靜而后能安安而后能慮慮而后能得乃是陰陽相合今時有等邪人在皮囊上做工夫升降陰陽氣上下前後顛倒做轉在皮脊上運轉上至性門下至尾閭穴中至背脊雙關尾閭穴發火直透頂門呌名三關九節又呌曹溪路又名黃河水逆流又名上天梯異名多不録背脊中三條路中間直透頂門擊破樓頭鼓進入泥丸宮降下明堂橋重樓送入丹田與嬰兒姹女懷胎結聖運得轉者却病益壽運不轉者成腦漏蠱脹久後見境成邪或是半夜三更由如白日或見圓光或見陰神或見陽神或見如來但有見相並是邪相聖賢者有十聖三賢十聖即十地歡喜地離垢地發光地焰慧地難勝地現前地遠行地不動地善慧地法雲地住四禪淨居天宮三賢者初禪為初賢即十住位發心住治地住修行住生貴住方便住正心住不退住童真住法王子住灌頂住二禪為中賢即十行位歡喜行饒益行無嗔恨行無盡行離癡亂行善現行無著行尊重行善法行真實行三禪為上賢即十回向位離衆生回向不壞回向等一切佛回向至一切處無地回向無盡功德回向隨順平等善根回向等觀一切衆生回向真如相回向無縛解脫回向法界無量回向是故陰陽相合聖賢宗此十聖三賢皆有輪回生死直要修到裡頭空外頭空裡外相連打成一片無內無外無東無西無南無北無上無下渾身是一箇清虗是故打成一片方才成道若要打成一片殊非離色身之外別參一步你看你看一貫清虗故云那知身外脫微塵離相寂滅五蘊皆空四相絶慧燈常不滅雲散家家月佛乾坤普照徹大地光輝朗朗銀世界雪點須彌一片白雪點須彌一片白直下空虗離諸形相故云離相寂滅五蘊皆空者乃是色受想行識也且色者罣礙之義若見境逢物不著不思色蘊自空也受者領納之義若遇一切聲色境界心不領納受蘊自空也想者妄想思慮之義若過去不思未來不想現在自如想蘊自空也行者心念不停遷流之義若十二時中心不外遊念不煩亂不被物轉不被境留一念不離當處行蘊自空也識者分別親疏之義亦乃著物之理若見一切境物一無分別一槩平等見如不見識如不識來則應之去則不思識見自空也四相者須菩提言世尊我今得聞如是般若經典信解受持親見如來不足為難若當來世後五百歲不見如來其有衆生得聞如此金剛經信解受持是人則為第一希有何以故此人無我相無人相無衆生相無壽者相無我相者色受想行識空也無人相者四大不實終歸地水火風也無衆生相者無滅生心也無壽者相者我身本無豈有壽也四相既無法眼明徹自心如來故云五蘊皆空四相絶若是五蘊空四相絶的人不可間斷時時常照是故慧燈常不滅若有智慧燈照破煩惱浮雲現出本性一輪明月故云雲散家家月我的佛若得煩惱無明散現出本性當人照破恆河沙數三千大千世界是故乾坤普照徹大地光輝處處發現再無異色故云大地光輝朗朗銀世界好似雪點須彌一片白既是雪點須彌山王那有三界四禪之相即見本性光明一片白咦亦如千日放大光明持經功德真經不識量機大用萬法歸一持誦此金剛經者功德亦如虗空不可度量佛呌須菩提若有善男子善女人初日分寅卯辰即三世以恆河沙等身命布施中日分巳午未即三世復以恆河沙等身命布施後日分申酉戌即三世亦以恆河沙等身命布施成住壞空分十二時性理中說天劈於子地劈於丑人生於寅成劫中二十轆轤劫每一轆轤共計一千六百八十萬年住劫壞劫空劫亦復如是成住壞空四相劫每一劫分三世過去莊嚴劫出一千佛見在賢劫出一千佛未來星宿劫出一千佛如是無量百千萬億劫以身布施若復後有人聞此金剛經典信心不逆其福勝彼勝是三時布施何況書寫受持讀誦在心為人解說一念聞經其福勝是三時布施又況書寫讀誦為人解說當知此人決定成就阿耨多羅三藐三菩提佛言須菩提以要言之是此經有不可思議不可稱量無邊功德如來為發大乘者說為發最上乘者說若與小乘人說決然不信若有人能受持讀誦廣為人說是名檀波羅蜜如來悉知是人悉見是人如來具六通豈不知見也此等之人皆得成就無上菩提不可稱不可量無有邊不可思議功德如是這樣人等則為荷擔如來阿耨多羅三藐三菩提大乘者智慧廣大善能建立一切法最上乘者不見垢法可厭不見淨法可求不見涅槃可證不作度衆生心亦不作不度衆生想是名最上乘何以故須菩提若樂小法者著我見人見衆生見壽者見則於此金剛經不能聽受讀誦為人解說何名樂小法二乘聲聞乘樂小果求禪定法願生禪天不發大心不能受持讀誦此經須菩提在在處處若有此一卷金剛經一切世間天人阿修羅所應獻花供養當知此處則為是塔皆應供敬作禮圍繞以諸華香而散其處此一卷金剛經非是紙上的要人信受若人口誦般若心行般若常行無相無著之行此人所在之處如有佛塔感得一切天人各持供養作禮供敬與佛無異故云持經功德雖然如是乃是假經有一卷真金剛經在當人分上人皆不識故云真經不識若是小乘人勸他誦紙上的若是大乘人勸他誦本性上的是故量機大用小乘人若誦得紙上的純熟明得理見得性也到萬法歸一大乘人認得本性是真金剛經也到得萬法歸一是故量機大用萬法歸一持經功德十五圓妙機合盡七支傳二分布施無間斷明月海底現金蓮持此一卷金剛經者明得無著無相之理不著我人衆生壽者體得三十二相清淨行如此之人由如十五夜的圓月無有缺缺故云持經功德十五圓此一卷金剛經的玄妙之理合盡將來總在七覺支上一名念覺支乃是靈心不昧一切皆空二名擇法覺支乃是法無差謬明了義經不明不了義經了義經者即勝義空乃是真空法空而不空是也不了義經者即世俗法有求有證有念有住是也三名清淨覺支勤修不退一覺永覺是也四名喜覺支所修正法皆樂禪悅禪悅者清淨也五名猗覺支除諸煩惱所覺無覺是也六名定覺支如所心定明明了了是也七名捨覺支不為世法所牽離覺所覺是也是故妙機合盡七支傳二分布施者說法度人乃是法施布施錢財乃是財施若得財法二施由如明月海底現金蓮明月却在大端金蓮却在海底乃是月影如是之人上下明月徹打成一片故云二分布施無間斷明月海底現金蓮持經功德福等虗空不可說一花開五葉至今常不謝佛不生更不滅不短不長無圓亦無缺本性常明光皎潔本性常明光皎潔持此一卷金剛般若波羅密經福等虗空難度難量佛呌須菩提以要言之是經有不可思議不可稱量無邊功德是故福等虗空不可說一花開五葉者達磨是一花傳下二祖慧可三祖僧璨四祖道信五祖弘忍六祖慧能乃是五葉故云一花開五葉至今常不謝者後傳南嶽馬祖百丈南泉鹽官歸宗大梅佛光盤山麻谷東寺西堂第三世黃檗長慶太慈平日岸石霜古靈和安通趙州共有七千箇祖直至今時清虗居士是故至今常不謝我的佛不生更不滅者這箇本來面目不生本來無有父母所生不滅本來萬劫不死不短不長者本來無有相貌有甚長短無缺無圓者本來面目無有圓缺處處放光處處發現又無相貌是故本性常明光皎潔清虗居士屠垠注
