front:
  text: 小引其金剛經三十二分皆釋迦佛與諸弟子問答之謂也流傳中國僧俗諷誦者益廣每日敬誦不提正念惟圖多數而紀功蹟不知金剛二字包含意味無窮焉夫金性剛堅煆煉不損是由喻於人之性也長存如在永劫不磨雖去而復來雖來而復去往往來來何日是了不識修持應無所住何得正道無去無來耶故儒曰天命之謂性皆識其中又曰中者天下之正道也知其中正之道識其金性之剛堅予幼失怙少學不敏甫時時齡毋志栢舟今逾四十六載耆年七十有五每思老母操持苦節報恩何及予因家貧客遊天津幸逢明師諭我精持齋戒方能報本是即惺然頓發鄙志領受諭言誠至齋戒指我迷津纔明真性報母之願有期矣何以明其真性所云金剛二字信其性然是年冬初客旋姑蘇夏林二君過訪袖出金剛鐵鋑錎解視予玩味深遠句句在正字字合中是以復梓行世凡誦金剛經者必須細閱根由方明出世之因真為手鏡之用也云耳順治戊子端月朔日柯山一止居士龔泰瑞麟生父沐手謹識
