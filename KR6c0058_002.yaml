body:
  text: 能淨業障魔軍趕散提起法性直到彼岸老子云若能嘗清淨天地悉皆歸復次又叫須菩提若善男子善女人受持讀誦此金剛經若為人輕賤不得人敬重是人先世罪業應該墮三惡道以今世被人輕賤故先世罪業即為消滅當得阿耨多羅三藐三菩提佛言持經之人該一切天人恭敬供養為前世業重嘗被人輕賤不得人恭敬供養自今受持金剛經典不起人我等相冤親平等心無惱恨念念嘗行般若波羅密行如是修行先世罪業即為消滅當得阿耨多羅三藐三菩提佛又叫須菩提我念過去往昔無量阿僧祇劫直至於燃燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者佛言我思過去無量劫前行菩薩道時四事供養遇此數佛一一佛所盡心盡力為求佛故須菩提若善男子善女人於後末法之世有受持讀誦此金剛經者所得功德勝我所供養諸佛功德百分不及一我若具說者或有人聞心則狂亂狐疑不信須菩提當知是此金剛經義不可思議功德果報亦不可思議是故能淨業障若是能淨業障之人人我不生嘗能清淨魔軍自然而散雖然如是不要忘了本主故云提起法性直到彼岸能淨業障再不生放下身心好用功大道本來嘗清淨方知不礙主人公業障者有五業五障五業者弒父弒母弒阿羅漢出佛身血破和合僧五障者煩惱障報障障礙事障理障能淨業障者時時刻刻嘗行般若清淨行除却人我貪嗔除却無明煩惱如是之人能淨業障再不生身心者身有三業貪淫殺害偷盜心有無數業障慳貪心利名心嫉妬心計較心勝負心貢高心我慢心殺害心狠毒心三毒心怕怖心邪心妄心無明黑暗心有種種不善之心若能放下身心好下般若功用是故放下身心好用功此箇大道之理不用做作即要身心清淨故云大道本來嘗清淨如此行持方知不礙主人公也能淨業障前世冤𠎝今世忘幻化非真相色空皆一樣佛真如妙難量自在縱橫出入嘗收放遍界明明不覆藏遍界明明不覆藏能淨業障之人以今世人輕賤故先世罪業即為消滅故云前世冤𠎝今世忘幻化色身非是真相心經云色不異空空不異色色即是空空即是色是故色空皆一樣我的佛這箇真如之體本無相貌隨處現青黃的故云真如妙難量則要行人把自己一箇當人嘗要自在縱橫提得起放得下牧得隴匝得開摧得動撥得轉如是行持才得遍界明明不覆藏究竟無我玄門有鎖不得匙開生死難躲直下究竟原無我體四大六根總無交涉一口無常盡皆敗壞百無一用即因世人皆執有身迷己逐物棄親向疏認賊為子妄將四大六根為實作種種業造種種苦故有輪回生死若有究竟之人盡底掀翻萬緣頓息故云究竟無我爾時須菩提白佛言世尊善男子善女人發阿耨多羅三藐三菩提心云何應該是修行人的住處云何降伏其貪妄之心佛告須菩提善男子善女人發阿耨多羅三藐三菩提心者當生如是般若心住我應該滅度一切衆生滅度一切衆生已而無有一箇衆生實是我滅度者如此者除能所心也除衆生心也除我慢心也才得降伏其貪妄心也何以故須菩提若菩薩有我相人相衆生相壽者相則非是菩薩若見有衆生可度即是我相有能度得衆生心即是人相謂涅槃可求即是衆生相見涅槃可證即是壽者相有此四相即非菩薩所以者何須菩提實無有我人衆生壽者法發阿耨多羅三藐三菩提心者須菩提於意云何如來於燃燈佛所有四相法得阿耨多羅三藐三菩提不須菩提會佛之意故言不也世尊如我解佛所說義佛於燃燈佛所無有四相法得阿耨多羅三藐三菩提佛言如是如是佛又叫須菩提實無有四相法如來得阿耨多羅三藐三菩提須菩提若有四相法如來得阿耨多羅三藐三菩提者燃燈佛則不與我受記汝於來世當得作佛號釋迦牟尼以實無有四相法得阿耨多羅三藐三菩提是故燃燈佛與我受記作是言汝於來世當得作佛號釋迦牟尼何以故如來者即諸法如義此句甚疑如來有我人衆生壽者四相法得了阿耨多羅三藐三菩提法者燃燈佛則不與如來受記實無有四相法不得阿耨多羅三藐三菩提燃燈佛受記與來世何不今世就成佛道咦科家道即應著了無得法點為來世證菩提如此者還在門外諸法如義者不著色聲香味觸法也佛叫須菩提若有人言如來得了阿耨多羅三藐三菩提須菩提實無有四相法佛不得阿耨多羅三藐三菩提須菩提如來雖然所得阿耨多羅三藐三菩提於如是法中無實無虗無實者此菩提妙法一切不著心無生滅故言無實無虗者此菩提法本有萬行大慈大悲大喜大捨用之不少故言無虗是故如來說一切諸法心無所染皆是佛法須菩提所言一切法者雖然說度人或大乘或上乘或小乘心無能所即非一切法又要利己利他是故名一切法佛又叫須菩提譬如人身長大須菩提答言世尊如來說人身長大皆有限量則為非大身法性量等空虗是名大身色身雖大內無智慧不能成就則非大身法身雖小內有智慧心無能所限量是名大身佛又叫須菩提菩薩亦如是明白此理若作是言我當滅度無量衆生若有度衆生之心則不名為菩薩何以故須菩提實無有四相法名為菩薩是故佛說一切菩薩緣覺聲聞之法無我無人無衆生無壽者須菩提若菩薩作是言我當莊嚴西方佛土是不名為菩薩何以故如來說莊嚴佛土者若是布施齊僧拜經拜佛念彌陀觀想西方即非莊嚴心淨即佛土淨是名莊嚴是勝妙定經云假使有人造得白銀精舍滿三千界不如一念禪定心心有能所即非禪定能所不生是名禪定禪定即是清淨心也佛告須菩提若菩薩通達無我的法者如來說名真是菩薩故云玄門有鎖修行之人若無智慧鑰匙透開金剛無縫之鎖切須參訪知識名師一一鑿破才躲得生死輪回故云不得匙開生死難躲究竟無我路不通上呼下吸在居中不正不偏長安道聲聲喚應主人公四大色聲是命本來面目是性見金眼看耳聞鼻臭口說手拈腳走是我的安身立命若是究竟無我四大無了那裡是我安身立命是故路不通上呼下吸者呼出肝與肺吸入心與脾皆在兩腎上起左腎父精為人種右腎母血為人根故有皮囊左腎為丹田右腎為命門左腎為嬰兒右腎為姹女號做趙州橋中間本主巍巍不動故云上呼下吸在居中若說正眼看耳聽鼻聞口說手拈腳走若說偏本來不住眼耳鼻舌身意是故不正不偏長安路叫張三應諾叫李四應咳故云聲聲喚應主人公這箇就是安身立命也究竟無我百歲光陰一剎那行住并坐臥時時休蹉過佛急急念彌陀勢至觀音接引極樂國九品蓮臺禮拜佛九品蓮臺禮拜佛究竟無我之人看破了皮囊一百歲光陰則當得剎那之間閃電之間有何嘗也偈曰百歲光陰燃指間奔馳不定片時閒煩君點檢形骸骨多少英雄去不還是故百歲光陰一剎那苦勸行人在行住坐臥四威儀內細細檢點不要放過故云行住并坐臥時時休蹉過佛叫須菩提實無有四相法名為菩薩是故佛說一切聲聞緣覺菩薩之法皆修無我無人無衆生無壽者須菩提若是菩薩作是言我當莊嚴西方佛土是不名為菩薩何以故如來說莊嚴佛土者六度萬行假名莊嚴事理故云即非莊嚴直得心淨是名莊嚴我的佛雖然如是世人根基大小難以化度故分三乘故勸世人急急念彌陀勢至觀音接引西方極樂國九品蓮臺上花開見佛悟無生且到不退菩提登彼岸故云九品蓮臺禮拜彌陀佛一體同觀八萬四千利益金剛透出三千萬法歸一更無異觀故云一體同觀須菩提於意云何如來有肉眼不須菩提會意觀色身不久皆歸敗壞故言如是世尊如來有肉眼佛叫須菩提其意云何如來有天眼不須菩提會意乃普照大千沙界故言如是世尊如來有天眼佛言須菩提於意云何如來有慧眼不須菩提會意乃智燭常明故言如是世尊如來有慧眼佛言須菩提於意云何如來有法眼不須菩提會意乃了諸法本空故言如是世尊如來有法眼佛言須菩提於意云何如來有佛眼不須菩提會意自性常覺本來不二故言如是世尊如來有佛眼不即如來有五眼一切人盡有五眼為迷所覆不能得開修行人除却迷心即得五眼開明佛又叫須菩提於意云何如恆河中所有沙佛說是沙不須菩提會意恆河有四十里濶沙細如故言如是世尊如來說是沙佛言須菩提於意云何如一恆河中所有許多沙況有如是沙等恆河是諸多恆河所有無量沙數喻諸佛世界如是寧為多不須菩提會意況一恆河有四十里濶河中沙細如又況一粒沙是一恆河故言甚多世尊佛告須菩提爾所國土中所有衆生若干種種不善之心如來悉知何以故如來說諸差別心皆為非妄之心識得妄心非心是名為真心是故八萬四千所以者何須菩提過去心不可得現在心不可得未來心不可得如來正遍知眼見衆生心內起諸妄心一一如恆河沙數前念後念中念皆從無明中生如來清淨心中顯現在白如水波心柴不住水也過去心以過去妄想他甚麼現在心真心無相一切臨危掇不去思量他甚麼未來心未來未至想他不來是故利益金剛透出三千界一體同觀路不迷出入縱橫有誰知門前有條中直路根深不怕大風吹若是一體同觀之人上觀天庭下觀衆生中觀人民廣觀諸佛細觀萬類一切山河大地異類衆生再無異觀故名一體同觀行人十二時中如此覺照皆是一體故云一體同觀路不迷如此觀看放出不著境界收來不住妄想是故出入縱橫有誰知門前有一條虗空大道中直路憑他黃風刮黑風吹本性巍巍不動故云根深不怕大風吹一體同觀點破三心不用參三箇鐵鐫錎嚼碎囫圇咽佛滋味總一般前後三三將來做一擔五眼圓明證涅槃五眼圓明證涅槃一體同觀之人上至仙佛下至昆蟲草木各各元本總是同故云一體同觀點破三心者乃是過去心不可得現在心不可得未來心不可得此三心皆是妄心若除了無名妄想心總是如來親弟子故云點破三心不用參三箇鐵鐫錎者乃是貪嗔癡此三心皆在貪嗔癡此貪嗔癡由如三把鐫利快刀故要嚼破囫圇咽此貪嗔癡雖分三事總是妄心是故㘂味總一般前後三三者昔日無著文入五臺山遇一老翁牽牛而行邀文入寺翁喚均提童子應聲而出來迎翁縱牛引文升堂堂宇皆金色翁踞坐指繡墩命坐翁曰近者何來文曰南方而來翁曰南方佛法如何住持文曰末法比丘少奉戒律翁曰多少衆文曰或三百或五百文即問此間佛法如何住持翁曰龍蛇混雜凡聖同居文曰多少衆翁曰前三三後三三翁喚童子致茶餅酥酪文納其味心意豁然翁拈起玻璃盞問南方還有這箇麼文曰無翁曰尋常將甚麼吃茶文無對見日色晚遂問翁言投宿得否翁曰汝有執著心在不得宿文曰某甲無執著心翁曰汝曾受戒否文曰受戒久矣翁曰汝無執著心何用受戒文辭退翁使童子相送文問童子前三三後三三是多少童子喚文德文應諾子曰便是多少文問此為何處子曰金剛窟般若寺文悽然而悟彼叟即是文殊童子稽首願乞一言謂別子說面上無嗔是供養口裏無嗔吐妙香心內無嗔是真寶無垢無染是真常童子言訖與寺俱隱但見五色雲中文殊騎金毛獅子往來雲中忽然白雲從東來覆之不見雪竇頌曰千峰盤曲色如藍誰謂文殊如對談堪笑清涼多少衆前三三與後三三若是前後三三一擔挑得轉山河為自己轉自己為山河如是之人決然五眼圓明五眼者乃是肉眼天眼慧眼法眼佛眼如是五眼圓明照見恆河沙數三千大千世界才曉得諸佛如來涅槃受用故云五眼圓明證涅槃法界通化達磨傳下折蘆過江神通變化佛身充法界通達化無邊楞嚴經云若一人發真歸元十方虗空悉皆銷殞故云法界通化達磨面壁九年他有向上之意是故達磨傳下昔日達磨到與江口無船而渡折蘆過江乃是達磨的神通變化西天二十八祖都有神通因有神通障了無為道東土五祖不傳神通故云折蘆過江神通變化法界通化有功能處處相逢路亦通今遇明師親指點直至西方舊古今本性包含法界天地一性之中佛叫須菩提於意云何若有人滿三千大千世界金銀琉璃等七寶以用布施是人以是因緣得福多不須菩提會意前世是因今世是緣今世修因後世受緣故言如是世尊此人以是後世因緣得福甚多佛叫須菩提若福德有實不能成就佛果菩提如是不說得福德多以福德無故他不究自己生死不得佛果菩提如來說得福德多即是來世天上人間富貴報三千大千七寶布施之福俗眼為實慧眼見空福歸俗諦空歸真諦寸絲不掛慧性圓明慧福雙修不住那畔福即現世慧了生死超脫三界是故布施之福百分不及其一故云法界通化有功能你看有功能的人迎賓待客做買做賣思算計較言談語話吹歌唱曲造作安排手拈腳走是故處處相逢路亦通今日又遇明師親指點咄指點那箇喏便是這箇西方者自性西方不從外得心淨是也舊古今者本來無古無今四維上下古往今來渾身一箇西方故云直至西方舊古今法界通化識破塵勞是虗花萬緣都放下寸絲全不掛佛精裸赤剎剎五蘊皆空好把白牛跨駕一朵祥雲直到家駕一朵祥雲直到家法界通化之人識破塵勞皆是虗花境界臨危之時一件也拿不動即有一箇身體又是異物就是夫妻兒女難替無常故云識破塵勞是虗花若要超生脫死須是萬緣放下絲毫不掛我的佛如是之人精裸裸赤剎剎五蘊皆空跨住白牛白牛者乃是大乘白牛車非是羊車鹿車駕祥雲者祥雲即是瑞氣乃是向上之意是故蘊空好把白牛跨駕朵祥雲直到家離色離相三玄向上末後一著便是了當色相因緣妄想生若離妄想即得見性佛叫須菩提於意云何佛可以三十二相具足色身見不須菩提會意故言不也世尊如來不應以具足色身見何以故如來說具足色身皆有敗壞即非具足色身若行三十二清淨行是名具足色身佛恐須菩提認三十二相色身以為如來為遣此迷故問可以具足色身見否須菩提會意具足色身皆有敗壞即非具足內具三十二清淨行是名具足佛又叫須菩提於意云何如來可以具足我人衆生壽者諸相見不須菩提會意故言不也世尊如來不該應以具足我人諸相見何以故如來說我人諸法具足即是妄心識心乃是輪回之根即非具足若得妄心識心無明心煩惱心俱無是名諸相具足若是修行之人貪嗔癡三毒未泯言見法身者故無此理皆是大誑語但能見者祇是化身妄想上來的非是清淨法身若要見清淨法身須是忘情絶念獨露玄機忽然㘞地一聲遍周沙界隨處現身故云離色離相三玄者體中玄句中玄玄中玄體中玄者函蓋乾坤句句中玄者隨波逐浪句玄中玄者截斷衆流句又云得意忘言意中玄一句明明體中玄九月菊花句中玄向上者乃是向上之意故云三玄向上末後一著者昔日世尊正法眼藏涅槃妙心付與迦葉故云末後一著便是了當離色離相是真空撒手揚揚不染塵一點靈光自家的清淨來往不見踪若得離色離相一箇清淨真空故云離色離相是真空佛云須菩提於意云何如來可以具足我人諸相見不須菩提言不也世尊如來不應以具足我人諸相見是故撒手揚揚不染塵須菩提言何以故如來說我人諸相即是妄念識心非為具足若得妄心識心俱無是名諸相具足具足非具足不從外得乃是一點靈光故云一點靈光自家的這一點靈光在眼曰見在耳曰聞在鼻曰嗅在舌曰論在手曰拈在腳曰奔通身周遍徹滿十方明者喚做佛性不明者喚做鬼魂是故清淨往來不見踪離色離相念佛當生極樂九品蓮開放出廣長舌相佛彌陀放毫光接引衆生同赴蓮花藏本性常聞般若香本性常聞般若香離色離相之人不於一佛二佛三四五佛而種的善根而已於無量千萬佛之所恭敬供養而種諸善根聞此金剛章句乃至一念生清淨者所以難進難解故勸修行人一心念佛當生西方極樂世界九品蓮開花開面光阿彌陀佛出廣長舌相遍覆三千大千世界咦阿彌陀佛舌頭遍覆三千大千世界頭有幾能大大彌陀經云阿彌陀佛身長百萬億那由他恆河沙數由旬佛領頭云彌陀兩眼號紺目紺目澄清四大海阿彌陀佛眉間嘗放白毫光白毫宛轉五須彌一箇須彌山王廣高十六萬八千由旬阿彌陀佛身中有八萬四千相好光明光中化佛無數億化菩薩衆億無邊如此者科儀有偈曰步步頭頭皆是道彌陀原不住西方法身遍滿三千界化佛權為十二光若念得這箇彌陀佛著接引衆生同赴華藏莊嚴世界海是故同赴蓮花藏行人若依般若波羅蜜多法者才到得華藏莊嚴極樂世界是故本性常聞般若香若即一念念佛觀想西方即到得西方極樂蓮華化身花開見佛還要悟無生法也咄西方是有是無噫一切皆是妄想所生了妄歸真也非說所說不在分別響亮一聲石人腦裂解說非干舌能言不在聲說的不是法聽的不是經佛言須菩提汝勿謂如來作是念我當有所說法我雖說法無有說法之意汝莫作如是之念何以故若人言如來有所說言即為謗佛不能解我所說故須菩提我說法者不在語言上說不在文字上說皆在自性上建立三寶開導迷人領見本性故云無法可說是名說法凡夫說法我能我會我悟我達能所不除雖然說法度人如貧數富寶自無半分文即是地獄種子如來說法如響應聲任用無心不同凡夫作生滅心說若言如來有能所說法即為謗佛昔日善星比丘講得十八香象䭾經人我不除生身活陷地獄雲光法師講得天花亂墜貪嗔不改墮在堰牛雜摩經云真說法者無說無示真聽法者無聞無得了萬法空寂故云非說所說不在分別爾時慧命須菩提白佛言世尊頗有衆生於未來世聞說如是般若之法生信心不佛言須菩提生信心受持此金剛經者四相永絶我人不生彼非衆生執著人我四相不除非不衆生何以故衆生衆生者執有執無二衆生也如來說衆生心同太虗非是衆生乃是解脫佛性若是執有執無者是名衆生若有人明得此經之理體得此經之行講說此經者乃是法雷響亮一聲把這些打死坐的石人驚得膽戰心寒故云響亮一聲石人腦裂咄行到山盡水窮處懸崕撒手處瞬目之時忽然㘞地一聲由如轟雷霹𮦷掇轉虗空通身無我咦命根頓斷虗空裂獨露堂堂一法身是故響亮一聲石人腦裂非說所說實強高要知平地起波濤三心頓徹須彌頂一點靈光透九霄非說所說者乃是不說而說心無住相如是之人實是強高雖然如是不明自己不斷生死根是故要知平地起波濤若知起處便知生死根源昔日劉海月參白雲師父拜而問曰弟子念慮降伏不住如何師問曰是誰念慮海月云弟子師云是誰降伏海月似省不省沉吟微笑師云來去都由你閙好沒主宰若是敵他不過即便放下更要知放下的是誰若識得自有主宰便不被他瞞過海月遂省禮拜而謝又有石霜和尚問石頭和尚舉念不停時如何石頭云咄是誰舉念石霜於此大悟但只如此念念不離當處舉意思慮語言知覺從何而出故云要知平地起波濤若識得了只要三心頓徹過去心不可得現在心不可得未來心不可得此三心頓徹人現在三界之外是故三心頓徹須彌頂一點靈光透九霄非說所說聾漢聽經啞解說鐵樹花開放至今無枝葉佛這事委的拙說者聽者其實難分別古佛西來玄妙訣古佛西來玄妙訣講說非干舌聞聲不是聲啞子談妙法聾子隔壁聽此言無情說法乃是潯潺緑水出廣長舌出雲騰鳥飛水流風動百草生芽星移斗轉昔日蘇東坡一見有省偈曰溪聲盡是廣長舌山色無非清淨身夜來八萬四千偈今日如何舉似人此無情說法喻如鐵樹開花雖然開花却無心也無枝葉者若是有情人說法便有羊車鹿車牛車分為大乘中乘小乘有枝有葉若乃無情說法直指人心見性成佛無有枝葉是故至今無枝葉我的佛無情人又不念佛又不拜佛又不燒香又不點燭又不誦經又不打坐這事其實委的拙若是說經者誦經者聽經者聽說者此二等人會不著西來大意故云其實難分別昔日如來正法眼藏神光三拜依位而立又昔日須菩提講般若法大梵天王來聽法讚云尊者講得好般若法尊者云世尊談經四十九年不曾開口我亦不曾開口如何稱讚妙法天王云我一法不聽得實是般若妙法呵呵聽的不曾聽說的不曾說是故才是佛祖西來玄妙訣無法可得對面不識父子上山各人努力悟性空故無法可得須菩提白佛言世尊佛得阿耨多羅三藐三菩提為心無所得耶佛言如是如是佛叫須菩提我於阿耨多羅三藐三菩提乃至無有希求少法可得是名叫阿耨多羅三藐三菩提須菩提言心上清淨即是菩提佛言如是如是我於菩提實無希求之心名叫阿耨多羅三藐三菩提乃是自己靈覺真性咄要見真性麼不須覔火把燈尋渴飲飢餐常對面故云父子上山各人努力無法可得最為高靈山會上轉千遭修向蓮臺分明現彌陀出現趙州橋五蘊本空四相俱忘無一法而可得如是之人最為高強五蘊空四相忘的人由如親在靈山會上轉過千遭面見釋迦牟尼佛印證是實雖然如是請問老師昔日釋迦佛靈山說法雙林涅槃今在何處呀遍大地都是釋迦佛的丈六金身是故靈山會上轉千遭金時有等迷人即知西方極樂世界蓮開見佛不想此處就是蓮花化生我今明說信受奉行此地下金沙輪所持金沙輪下水輪所持水輪下風輪所持風輪空虗所持有一大蓮花所載一蓮花中載一須彌山王七環香海七環金山一四大鹽海一四大洲一日月所照名一世界小千世界小千蓮花每各一千有一大蓮花總載名中世界千箇中千世界又一大蓮花總載名為三千大千世界為一佛剎土上下二十佛剎最下一大蓮花所持名為寶光明剎種妙光香水海周圍十數中間一數十數之外又有十數共二十一箇寶光明剎種總該四百二十箇三千大千世界又有一大蓮花所持名華藏莊嚴世界海是故修向蓮臺分明現趙州橋者即是兩腎左腎為人種乃是先天父精右腎為人根乃是後天母血精血聚會結成色身呼吸在兩腎起落呼出是父精吸入是母血此是人的根種者也號為趙州橋若是趙州橋攤了本性彌陀去了故云彌陀出現趙州橋無法可得色即是空空是色色是真空舍權把房兒借佛無二亦無別海底嫦娥却似天邊月影落千江月一攝影落千江月一攝既然無法可得自己就是真空法性這箇真空法性無有色相則不能顯色相無有真空法性則不能生無垢子云法身與色身不必論疏親皆賴東君力花柳一般春故云色即是空空是色此色身田如客店主人暫住主若離舍屋即假塌主人常在故云色是真空舍權把房兒借我的佛天地日月山河大地草木叢林男女相貌一切萬物皆是真空發現是故無二亦無別嫦娥就是月也水喻色身月喻真空法性故云海底嫦娥却似天邊月影落千江月一攝也淨心行善如露如電作些透法通行一線清淨身心行諸善法復次佛又叫須菩提衆生本性與諸佛無二故言是法平等無有高下是名叫做阿耨多羅三藐三菩提修三菩提人以無我無人無衆生無壽者修一切善法則得阿耨多羅三藐三菩提此菩提法上至諸佛下至昆蟲盡含種智故言平等無有高下但離四相修一切善法則得菩提不離四相修一萬年不得菩提何名善法於一切法心無染著對一切境心不動搖於出世法不貪不愛於一切處常行方便到一切處為說正法領悟菩提是名修一切善法佛又叫須菩提所言善法者希望果報如來說非善法若心不望果報是名善法故云淨心行善一切修行之人不識此理但去參禪打坐打七煉魔拜經拜佛念經念佛燒香點燭修寺建塔齊僧布施求生天上人間後世福報報盡還入地獄這些有為之法如露如電若要超生脫死離色身外別參一步故云作些透法通行一線咦通那一線呵呵裏外一體空諸人拿不著淨心行善好修行世上有卷無字經若還有人尋得見便是知識出世人以清淨心行諸善法佛叫須菩提所言善法希望果報如來說非是善法不望果報是名善法是故淨心行善好修行雖然說一切善法不望果報乃是無字上發出來的此一卷無字真經又不在紙上又不在身上又不在眼耳鼻舌上又不在手拈腳走上却在世上科儀有偈曰數行梵字雲中鴈一曲無聲澗底琴德勝河沙渾不用清風明月是知音是故世上有卷無字經若還有人尋得見便是知識出世人也淨心行善般若堂中去參禪若要光明現單單提一念佛著力用心參萬法皆空無為真人現自在逍遙坐寶蓮自在逍遙坐寶蓮淨心行善之人要在般若堂中參禪見性忽然斷炮一聲信手掀開娘生屋掇轉虗空無一物淨然獨露活真人若到這般田地才進我的大門今時有等迷人不識此理到去深淨閒處不見人言所在打辦身心晝夜蒲團不倒謂之般若呵呵差之毫厘失之千里此般若堂乃是般若之理昔日梵志手執梧桐花獻佛佛云放下著梵志放下一手花佛復云放下著梵志又放下一手花佛亦云放下著梵志言我兩手花俱以放下了時今又叫我放甚麼佛云放下中間的梵志豁然大悟金剛經云無諍三昧人中最為第一清淨經云上士無諍下士好諍上德不德下德執德執著之者不明道德所以衆生不能成道者法華經云心同虗空界示等虗空法證得虗空時無是無非法明白得此理才是般若堂中參禪的人行人若要自己光明顯現切須提起一念不要放他妄想上去了便是輪回之根不要放他無明上著腳便是地獄之種不要放他慳貪上去了便是餓鬼根不要放他煩惱上住腳便是毒蛇之類不要放他我慢上去了便是修羅之種不要放他愚癡上去了便是畜生之根時時刻刻提起本主一念不要放捨是故行住坐臥不離這箇若離這箇當面蹉過如是行持才是佛門弟子我的佛著力用心參直要參到萬法皆空時節現出自己無為真人普覆大千沙界才得自在逍遙坐寶蓮咄有一等人口參大道心住貪真何也呀此人家事不辦心又不足恩愛不棄六欲不除煩惱不斷蓋覆佛性到臨危之時眼光落地一切不見地獄裏去了非干我事福智無比透骨透髓轉上崑崙了達生死福智等虗空無物可比喻佛叫須菩提若三千大千世界中所有許多諸須彌山王如是金銀琉璃珊瑚瑪瑙真珠琥珀等七寶聚有人持用布施若人以此金剛般若波羅密經乃至這四句偈等受持讀誦為他人說於前七寶福德百分不及其一就是百千萬億分乃至只當算數譬喻將來所不能及大鐵圍山高至三禪天中鐵圍山高至二禪小鐵圍山高至初禪此三鐵圍山喻六欲七情見聞覺知人我貢高須彌山高八萬四千由旬喻八萬四千塵勞妄想三千大千世界喻貪嗔癡各一千若人將自己真七寶布施勝是你金銀琉璃七寶等布施何名真七寶布施眼不貪色名色寶布施耳不貪聲名聲寶布施鼻不貪香名香寶布施舌不貪味名味寶布施身不貪觸名觸寶布施意不妄想名法寶布施性不起念名佛寶布施此是金剛般若波羅密法故云福智比透骨透髓崑崙者乃是須彌山王三界諸天俱在須彌頂上若行人超出三界故云轉上崑崙了達生死咄若要超三界萬雙草鞋跑呀怎麼超得過咦打死了識心現在三界外今時有等迷人運氣冲天透頂皮尾閭穴發了火後起透過背脊雙關上透紫微闕穿過崑崙頂降下明堂橋重樓送入丹田與嬰兒姹女懷胎結聖叫做轉上崑崙了達生死若是一把火燒了色身崑崙山也燒了也我看你那裏去安身立命呵呵千差萬差差得者不曾見也福智無比要心堅優鉢花開無兩般大道分明從此出佛的三昧本難傳福者七寶布施之福智者說法方便之智福智比愚將來百分不及其一若修智慧先要心堅是故福智無比要心堅世上的優鉢羅花乃是黃白花此花不是世上的此喻說法方便由是優鉢羅花開無有諍害之意故云無兩般譬如暗中寶無燈不可見佛法無人說雖慧不能了是故大道分明從此出惟有佛的三昧實是難說難傳若得聲聞乘法緣覺乘法菩薩乘法三界諸天法求生西方法求後世為人法這些有傳有受有教有證這便好傳佛的三昧乃是虗靈人空法空萬法皆空纖塵不起萬法不識教我傳箇甚麼故云佛的三昧本難傳福智無比萬丈玄門過客希道理非容易不離方寸地佛真如透漕溪一點靈光自然明歷歷八卦乾坤合太極八卦乾坤合太極修福者七寶布施之福求生天上人間富貴報若修智慧由如虗空不可度量故云福智無比此一卷金剛經的玄妙之理最廣最大即是無人踏著故云萬丈玄門過客希此經之理不於一佛二佛三四五佛而種善根以依無量千萬佛所種之善根聞是金剛經文字章句是故道理非容易此一卷金剛經不在紙上又不在字腳上却在本性上故云不離方寸地我的佛真如乃是本性真如漕溪乃是漕溪六祖昔日六祖參五祖時五祖問汝自何來答曰嶺南五祖曰欲須何事答曰唯求作佛祖曰嶺南人無佛性答曰人有南北佛性豈然是故真如透漕溪明得此理者眼看耳聽鼻聞口說手拈腳走故云一點靈光自然明歷歷八卦者乾坎艮震巽離坤兌按東西南北四維故云八卦乾坤合太極今時有等邪人說背脊中是漕溪路呵呵差之毫厘也化無所化不分小大參透正法自有高下衆生性本空化亦無所化佛叫須菩提於意云何汝等勿謂如來作度衆生是念我當度脫衆生須菩提莫作如此之念何以故實無有衆生如來度者若見有衆生如來度者如來也四相不除則有我人衆生壽者如此之語佛不曾度衆生衆生若要度殊非自度自佛又叫須菩提如來說有我者乃是自己真我本無形相則非有我而凡夫之人看見佛相我人不除以為有我須菩提凡夫者如來說本來無相我人不生即非凡夫執著我人等見是名凡夫如來說有我者自性清淨一切不著我不同凡夫貪嗔無明虗妄不實有我人者即是凡夫我人不生即非凡夫不悟般若法即是凡夫若悟般若法即非凡夫非是凡夫乃是解脫佛性是故不分小大若參透了正法依般若法修持體般若之行即非凡夫不依般若法修持不體般若之行故云參透正法自有高下化無所化盡超升掃盡塵勞古鏡明照徹本來娘生面逍遙自在道家人衆生性空本來清淨是故化無所化盡超升雖然如是還要行人掃盡色聲香味觸法塵勞現出本性一輪古鏡故云掃盡塵勞古鏡明這箇娘生面好些人差誤了有的人說本來面目是娘生面我且問你這箇本來面目是那箇養的心經作證不生不滅不垢不淨不增不減有誰人所生又有人說本來面目是無極生的我又問你無極生你本性本性可生誰麼世上有父必生子大道門中本無那話無極就是本性本性就是無極但有二必不是我今直說信受奉行父母生我身體有一箇面孔被人罵了面上生嗔被人說了面上通紅若還照破心內無嗔面上無惱故云照徹本來娘生面逍遙自在道家人化無所化一句彌陀被雲霞提起無生話萬神皆驚怕佛步步踏金沙寶蓋幢幡瓔珞垂珠掛七寶池中四季花七寶池中四季花既然化無所化單提自己一句阿彌陀佛即自恩愛煩惱無明暗遮覆蓋了佛性不得打開故云一句彌陀被雲霞即要行人提起父母不曾生的時節那一句無生話良久云這是無生法忍此是鬼神不破之機是故萬神皆驚怕我的佛若明此理大地皆為佛國頭頭盡是西方故云步步踏金沙如是之人將六塵改為七寶那七寶眼是色寶耳是聲寶鼻是香寶舌是味寶身為觸寶意是法寶性是佛寶如是七寶瓔珞隨身是故寶蓋幢幡瓔珞垂珠掛此四大七寶池中嘗開春夏秋冬四季心花才無無明煩惱暗遮顯出本性一輪明月法身非相方寸安上末後消息才是了當清淨法身非屬相貌佛叫須菩提於意云何可以三十二相具足色身觀見如來不須菩提會意報身具三十二相皆靠法身之力故答言如是如是以三十二相觀見如來佛恐須菩提有執相之病叫言須菩提若以三十二相觀見如來者轉輪聖王具三十二相八十種好於佛無二則是如來須菩提會佛之意白佛言世尊如我解佛所說義不該應以三十二相觀見如來是故法身非相此箇法身既無相貌今在何處即在做買做賣上迎賓待客上思算計較上故云方寸安上這箇末後消息世尊云若以色見我以音聲求我是人行邪道不能見如來此四句世尊不認人情乃是掃邪歸正世尊說若是色相上求見如來者以念經念佛音聲上求見如來者是此二種人行邪道不能見清淨法身如來也如是明白萬事了畢再不可高聲念佛再不可色相求佛本性中自有彌陀念須正念且道如何正念開看一些無動著三十棒咦打殺了怎麼好若得打殺了免得留在後頭纍世是故末後消息才是了當法身非相好根基千門萬戶放光輝未曾舉起三界外毗盧頂上一聲雷清淨法身不屬相貌上至仙佛下至昆蟲永嘉云諸佛法身入我性我性共同如來令故云法身非相好根基你看你看青青翠竹黃花遍大地發現是故千門萬戶放光輝咄怎麼修行人超出了三界俗語云舉心動念天地皆知超不出三界咦不舉意以前會良久云未曾舉起三界外毗盧此云遍一切處即是清淨法身這箇清淨法身行人要見打掃心田一心清淨日久月深由如轟雷霹𮦷信乎盡底掀翻掇轉虗空無一物暫然獨露活真人故去毗盧頂上一聲雷法身非相智慧圓明得一張五果并四向鼻孔都一樣佛無上法中王四智三身遍滿虗空藏體露堂堂盡放光體露堂堂盡放光這箇清淨法身非青黃赤白之相貌又無眼耳鼻舌身意是故法身非相若得智慧之眼圓明普照十方張者開也故云智慧圓明得一開開者悟也乃是智慧圓明得一悟五果者須陀洹果即是初禪天斯陀含果即是二禪天阿那含果即是三禪天阿羅漢果即是四禪天阿蘭那行果即是佛果是無諍行也四向者初果向二果向三果向四果向初果喻眼二果喻耳三果喻舌四果喻口佛果喻鼻雖然分眼耳鼻舌口不離一面是故鼻孔都一樣我的佛無上者再無有上萬法是他為主故云無上法中王四智三身者眼識耳識鼻識舌識身識此五識為成所作智意識為妙觀察智傳送為平等性智含藏識為大圓鏡智三身者妙觀察智成所作智二智轉為千百億化身平等性智轉為圓滿報身大圓智智轉為清淨法身若是行人一一轉得故云四智三身遍滿虗空藏觀音經云十方諸國土無剎不現身故云體露堂堂盡放光無斷無滅紅爐點雪千江普照一輪明月依空又落空無生斷滅見佛叫須菩提汝若作是說如來以具足三十二相故得阿耨多羅三藐三菩提須菩提莫作如是之念如來不以具足相故得阿耨多羅三藐三菩提須菩提汝若作如是之念發阿耨多羅三藐三菩提心者說了諸法斷滅頑空莫作如是之念何以故發阿耨多羅三藐三菩提心者於發不得斷滅頑空相須菩提聞說法身離相便不修三十二清淨行現成是菩提佛言須菩提莫作是念如來不修三十二清淨行而得菩提汝若言不修三十二清淨行而得阿耨多羅三藐三菩提者即是斷佛種性無有是處今時有等修行人離色身而別求法身永盡煩惱常住心寂滅如此者成於斷見乃是斷滅頑空呵呵不解色身內有法身即此色身從頭至足靈覺之性充滿一身如是會得色即法法即色有即空空即有一體真如不離色身超出三界永嘉云幻化空身即法身法身覺了無一物本源自性天真佛從上祖師借此幻身修成佛道古人云欲知佛性義不離世間覺離了世間覺何求佛性義如來不說斷滅相故云無斷無滅片雪者一切諸法乃是參禪打坐打七煉魔拜經拜佛觀想西方求生天上共有三千六百傍門小教一千七百則打坐公案九十六種外道七十二種邪法三千威儀八萬四千細行法門俱是片雪唯有本性是紅爐是故紅爐片雪一切男女相貌蠢動含靈喻如水中月影總是空中無極之月所攝故云千江普照一輪明月無斷無滅勇猛修團圓正教最難求死中活了活中死大死三玄響悟頭無斷無滅者若是著了有乃是西方東土天上人間即求後世果報此是凡夫也若是著了無萬法皆空本無一物乃是莽蕩頑空若是一心不染七情不生乃是無記頑空鬼家活計故云無斷無滅勇猛修此團圓正教有無俱不立一體是方親是故團圓正教最難求初進步之人就是死人一些而不省得拜了師父師將他活起性來才曉得眼看的耳聽的鼻聞的口說的手拈的腳走的提得起放得下推得動撥得轉展轆轆活潑潑便是死中活了又要活中取定萬緣放下纖毫念不起如此者一定之中不覺有天有地兩忘之後方知無我無人乃是活中死也是故死中活了活中死大死者人法雙忘也人忘者忘形忘體法忘者忘情忘念人法雙忘以後忽然外不見有山河大地內不見有聞見覺知㘞地一聲渾身一箇虗空普照大千沙界此是大死也三玄者得意忘言意中玄一句明上體中玄九月菊花句中玄響者斷炮一聲由如轟雷霹𮦷掇轉虗空歸於自己萬億諸佛打成一片才大死三玄響悟頭無斷無滅造化爐中玄妙訣離火常不滅坎水溫溫熱佛龍虎左右徹姹女嬰兒匹配中黃舍堪作蓬萊三島客堪作蓬萊三島客若修無斷無滅之人還要修真養性造化皆在爐中不要放他妄想上去了又不要他無明上住腳咄何者是爐我今明說信受奉行咦自己為爐元氣為鉛元精為汞心田中取出離火常要不滅不要放他出來燒壞了世界又要取出腎中坎水常要溫溫熱不要放他流了出去損壞了房屋我的佛心不動為之龍吟身不動為之虎笑龍吟則精固虎笑則丹成故云龍虎左右徹左腎為嬰兒右腎為姹女此是少陰少陽先天父精為人種後天母血為人根乃是老陰老陽是故匹配中黃舍中黃舍在臍下一寸三分名為丹爐用坎離水火煉成聖胎如是修行堪作蓬萊三島客咄有一箇人一些也不省得是如何此人一法無得做不受不貪真人到岸了達生死超出三關不受者心不領受不貪者愛欲不貪佛叫須菩提若菩薩以滿恆河沙數等世界將七寶金銀琉璃珊瑚瑪瑙琥珀真珠等持用布施若復後來有人知一切佛法無我能所心不生得成於無生忍此菩薩勝前七寶布施菩薩所作功德何以故須菩提以菩薩自己不受福德故須菩提白佛言世尊云何菩薩不受福德佛告須菩提菩薩所作功德度衆生不應貪著名利是故說不受福德通達一切佛法無能所心名為無生法忍此人福德勝前七寶之福百分不及其一是故不受不貪若修行人依得一切佛法無我此人了達生死三關者乃是三界若依得一切法無我皆是佛法此等之人決然超出三界故云了達生死超出三關不受不貪看華池悶坐不知是呆癡尋著山前漕溪路此處便是上天梯既然不受不貪你還要去看舌頭底下這箇華池便去悶坐一些須不想纖毫念不起是故悶坐不知是呆癡此四大色身號做寶山若有行人尋著寶山前面有一條漕溪路乃是離色身之外別參一步故云此處便是上天梯不受不貪學道參禪息萬緣放下娘生面單單提一念佛工夫便現全密密綿綿自然成一片倒坐虗空駕鐵船倒坐虗空駕鐵船不受者心上一切雜念不起一切萬法心不領受不貪者心上一切愛欲不貪故云不受不貪既然如是參禪學道之人還要把萬緣放下了面皮破了不要怕羞是故放下娘生面單單提一念南無阿彌陀佛行也念坐也念住也念臥也念生也念死也念日也念夜也念捨身捨命念即見念念全無影響境上全無作解言語雙忘身心俱泯頓見如一團清水相似赤歷歷隱在虗空之中活潑潑的無頭無尾無面無背皎皎明明念成一片是故密密綿綿自然成一片若是成一片的人自己是虗空鐵船是世界故云倒坐虗空駕鐵船如此者豈有高低上下也威儀寂靜要修禪定參達不透依舊是病四威儀中住淨無染佛叫須菩提若有人言如來若來若去若坐若臥在四威儀中是人不解我所說之義何以故如來者無所從來而不來亦無所去而不來故名如來如來者非來非不來非去非不去非坐非不坐非臥非不臥四威儀中嘗是空寂即是如來是故威儀寂淨有一等人要修禪定眼觀鼻鼻觀心心觀意意觀神五行攢簇四大本空纖毫念不起恐落無記頑空故云參達不透依舊是病咄怎莫是無病的人咦行住坐臥的是誰圓陀陀光爍爍轉轆轆活潑潑嘗對面不可捾科儀云妙體本來無處所通身何更有蹤由威儀寂靜三斤麻無影樹下法王家空中聽得金烏呌盡道西方路不差行住坐臥四威儀中寂靜之人心上由如三斤亂麻有工夫將去撚線無功夫拿去合繩故云威儀寂靜三斤麻無影樹者乃是太虗空也法王家者乃是水流風動雲騰鳥飛皆是法王說法是故無影樹下法王家今時有一切修行之人即曉得水中之日影叫做是我的佛性便是思量計較的便當了了他不識空中無極的金烏故云空中聽得金烏呌盡道西方路不差又有一等邪人運氣冲天透頂皮頭頂氣轉作聲叫做天上金雞叫西方路不差呵呵差斷蒲桃柵來年再不生若是燒了四大連這西方也燒了威儀寂靜點起般若智慧燈根本原潔靜寂然常在定佛境界更不生解脫樓前掛起軒轅鏡大地乾坤普照明大地乾坤普照明威儀寂靜之人還要點起智慧之燈照破煩惱無明是故威儀寂靜心經云不生不滅不垢不淨不增不減是故空中故云根本原潔淨又要行人行住坐臥之中寂然不動嘗座定中我的佛如是之人境界更不生解脫者即是寂滅寂滅者即是般若般若者即是本性虗空軒轅鏡者即是軒轅黃帝有一面鏡照見肝花五臟肥叟方圓將本性喻如軒轅鏡要照見一切煩惱無明恩愛七情俱以照破故云解脫樓前掛起軒轅鏡大地乾坤普照明一合相理如人飲水溫熱自知世間無比本性一合打成一片佛叫須菩提若善男子善女人以三千大千世界碎為微塵於意云何是微塵衆寧為多不須菩提會佛之意世界喻法身微塵喻色身故言甚多世尊何以故若是微塵衆實有者佛即不說是微塵衆所以者何此是世界喻法身微塵喻色身世界一也微塵異也碎世界作塵塵無異性念塵為世界界無異性譬如全法起應應無異性全應起法法無異性一異無差佛說微塵衆則非微塵衆乃是衆生心內微塵如三千大千世界微塵乃說性上妄念也即非世上微塵念上嘗在清淨微塵是名微塵世尊如來所說三千大千世界此言衆生心內貪嗔癡各一千則非世界若是貪嗔癡盡是名世界此衆生心內貪嗔癡不可測度故名大千何以故若世界實有者此衆生心內塵勞和合則是一合相如來說一合相衆生心有所得則非一合相心無所得時嘗清淨是名一合相佛叫須菩提一合相者即是不可說但是凡夫之人貪著一合相貢高我慢是非一切不除執著文字念不行般若波羅密法無有是處是故一合相理世人不知此理說也難信故云如來飲水溫熱自知世間人無比一合相理性道通寶珠一粒在虗空十方世界都照徹三世諸佛體一同一合相理之人性道俱通裏外明徹打成一片無上無下無東無西無南無北皎皎明明由如寶珠一粒在虗空之中照徹十方世界無彼無此無高無低上至仙佛下至昆蟲合一箇法體故云三世諸佛體一同也一合相理昔日梁王不識機達磨西來意折蘆過江去佛面壁九年餘祖祖相傳燈光常相遇一朵花開五葉齊一朵花開五葉齊本性一合打成一片再無修證佛言須菩提一合相者即是不可說但是凡夫之人貪著其事人我貢高貪著希求一合相法便說我能我會我悟我達人我是非是故不可說昔日梁武帝詔達磨帝問曰朕造寺寫經度僧不可勝記有何功德師曰並無功德帝曰何無功德師曰此但人天小果有漏之因如影隨形雖有非實帝曰如何是真功德師曰淨智妙圓體自空寂如是功德不以世求帝又問如何是聖諦第一義師曰廓然無聖帝曰對朕者誰師曰不識帝不領悟師知機不契折蘆過江寓于少林寺面壁而坐九年有餘後傳神光二祖三祖僧燦四祖道信五祖弘忍六祖慧能直至如今故云一朵花開五葉齊知見不生借假修真玄妙消息點鐵成金直下打成一片知見自然不生佛叫須菩提若有人言佛說的我見人見衆生見壽者見須菩提於意云何是人解我所說義不須菩提會佛之意如來有真四見不同凡夫故言不也世尊是人不解如來所說義何以故世尊說真我見人見衆生見壽者見即非妄我我是人見衆生見壽者見若是人明得真上起妄妄上起真真妄不分合而為一是名我見人見衆生見壽者見如來說令一切衆生自悟般若真智自修故說有四真見如來說一切衆生皆有佛性是真我見說一切衆生有無漏智性是真人見說一切衆生本無煩惱是真衆生見說一切衆生本性萬劫不壞是真壽者見凡夫之人不解佛意佛又叫須菩提發阿耨多羅三藐三菩提心者于一切佛法上應不著真妄如是知不著真妄如是見不著真妄如是信解雖度脫衆生不生說法相須菩提所言說法相者能所心還在即非說法相能所心不生是名說法相是故知見不生借假修真者如來說的玄妙之理領人見性不離色身無了色身何處修道故云借假修真凡夫色身就是一塊生鐵無明煩惱我慢貢高人我是非貪嗔妄想故有地獄輪回如來玄妙之理照破無明煩惱我慢貢高人我是非而得成佛是故玄妙消息點鐵成金知見不生法力多離了苦海出娑婆大吼一聲轟霹𮦷十殿閻王無奈河知見不生之人與三世諸佛同一修證真證菩提故云知見不生法力多如是之人離了苦海出娑婆若是大吼一聲由如轟雷霹𮦷掇虗空歸于自己渾身一箇清虗故云十殿閻王無奈河要拿上不著知見不生銷唱金剛一卷經人人同恭敬箇箇堅心聽佛種在八福中五蘊皆空心地明如鏡那怕閻王論世情那怕閻王論世情知見不生者乃修般若波羅密法也此一卷金剛單說般若波羅密法為四句偈是故銷唱金剛一卷經苦勸大衆不要蹉過了光陰故云人人同恭敬箇箇堅心聽我的佛種在八福田中以為菩提種子八福田者大慈大悲大喜大捨此四無量心加四諦法乃是苦集滅道俱無名為八福田即是心田也五蘊空者乃是無色受想行識也若得照見五蘊空便超生死界得免輪回苦成于無上道心地明如鏡者修行人的心鏡照破了煩惱無明我執妄想貢高好勇人我是非如是行持那怕閻王論世情應化非真見性明心超出三界清淨法身應身化身亦非真實佛叫須菩提若有人以滿無量阿僧祇世界七寶持用布施即是人天福報有福有盡若有善男子善女人發菩薩心者持于此金剛經乃至金剛般若波羅密經此四句偈等受持讀誦在心為他人演說利益一切衆生其福勝彼勝是阿僧祇世界七寶施人云何為人演說只是教人不取于諸相自性如如不動如如不動之心無希求心無生滅心無喜怒心一心不動故云如如不動何以故一切有為法如夢幻泡影如露亦如電應作如是觀夢者是妄身幻者是妄念泡者煩惱影者如業障露電者倐忽就無夢幻泡影露電是名有為之法豈為常也真實離名相悟者乃是無為法也號無量壽如來是故應化非真若是行人不取諸相自心如如不動決然見性明心若得見性明心而成佛道如是修行超出三界透露箇清淨法身咄若要超三界一點心無如是行持萬事了畢應化非真了三身萬道霞光一片明森羅萬象當頭現顯出丈六紫金身應身化身非是真實喻如夢幻泡影露電豈為嘗也這箇清淨法身也是假名故云應化非真了三身若是裏外相連打成一片由如萬道霞光一片明你看你看運行星斗日月風雨乾坤世界春生夏長秋收冬藏是故森羅萬象當頭現咄現出來的是箇甚麼咦原來現出釋迦牟尼佛的丈六紫金身應化非真普願人人報四恩風調雨順父母生身訓佛日月照臨恩佛法興隆好把乾坤鎮祝讚皇皇萬萬春祝讚皇皇萬萬春執化非真即了得妄緣故云應化非真應身者乃是四大色身化身者在色身之內迎賓待客思量計較的雖是應化非真身從何來故云普願人人報四恩四恩者天地蓋載之恩日月照臨之恩國王水土之恩父母生身之恩又保佑風調雨順國泰民安又勸大衆孝順父母我的佛又保佑佛法興隆好把乾坤鎮又祝讚皇皇萬萬春佛說是經已長老須菩提及諸比丘比丘尼優婆塞優婆夷一切世間天人阿修羅聞佛所說皆大歡喜信受奉行
